body:
  text: 卷四奇經八脈總説李時珍凡人一身有經脈絡脈直行曰經旁支曰絡經凡十二手之三陰三陽足之三陰三陽是也絡凡十五乃十二經各有一別絡而脾又一大絡並任督二絡為十五絡也難經作陰絡陽絡共二十七氣相隨上下如泉之流如日月之行不得休息故陰脈營於五臟陽脈營於六腑陰陽相貫如環無端莫知其紀終而復始其流溢之氣入於奇經轉相灌溉內溫臟腑外濡腠理奇經凡八脈不拘制於十二正經無表裡配合故謂之奇蓋正經猶夫溝渠奇經猶夫湖澤正經之脈隆盛則溢於奇經故秦越人比之天雨降下溝渠溢滿霧霈妄行流於湖澤此發靈素未發之祕者也八脈散在群書者略而不悉醫不知此罔探病機仙不知此難安爐鼎時珍不敏參考諸説以備學仙醫者筌蹄之用云奇經八脈總歌正經經外是奇經八脈分司各有名任脈在前督屬後衝起會陰腎同行陽蹺跟外膀胱別陰起跟前隨少陰陽維維絡諸陽脈陰維維絡在諸陰帶脈圍腰如束帶不由常度號奇經脈有奇常十二經者常脈也奇經則不拘於常故謂之奇也奇經有八曰任督沖帶陽蹺陰蹺陽維陰維是也任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈也陽蹺起於跟中循外踝上行於身之左右陰蹺起於跟中循內踝上行於身之左右所以使機關之蹺捷也陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也是故任沖主身前之陰督主身後之陽以南北言也帶脈橫束諸脈以六合言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也陽維主一身之表陰維主一身之裡以乾坤言也是故醫而知乎八脈則十二經十五絡之大指得矣仙而知乎八脈則虎龍升降玄牝幽微之竅妙得矣任脈循行圖任脈循行主病歌經文附注內任脈起於中極下中極穴名在臍下四寸任脈起於其下由少腹內胞門之宮會陰之分上行而外出循曲骨上毛際至中極上行腹裡循關元同足厥陰太陰少陰並行腹裡循臍下三寸之關元小腸之募三陰任脈之會循內上行會衝脈浮外循臍至喉咽別絡口唇承漿已過足陽明上頤間循面入目至睛明會督為陰脈海傳靈樞五音五味篇曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹上行會於咽喉別而絡唇口至承漿而終上頤循面入目至睛明會於督脈總為陰脈之海也按任脈由腹上行會於咽喉別而絡唇口血氣盛則肌肉熱血獨盛則滲灌皮膚生毫毛婦人有餘於氣不足於血以其月事數下任沖並傷故脈不營於口唇則髭鬚不生男子內結七疝病女人帶下瘕聚團任脈自前陰上行於腹故男女之為病如此任脈穴圖脈長四尺五寸凡此任脈之行從胞中上注目長四尺五寸總二十四穴按氣府論曰任脈之氣所發者二十八穴本經原缺一穴實只二十七穴內齦交一穴屬督脈承泣二穴屬足陽明蹺脈故只二十四穴任脈穴歌任脈中行二十四會陰潛伏兩陰間曲骨之上遊中極關元石門氣海邊陰交神闕水分處下脘建里中脘前上脘巨闕連鳩尾中庭膻中玉堂里紫宮華蓋運璇璣天突廉泉承漿止取穴分寸並別會陰一名屏翳在大便前小便後兩陰之間任脈別絡俠督脈衝脈之會一云任督沖三脈所起任由此而行腹督由此而行背沖由此而行少陰之分曲骨在橫骨上中極下一寸毛際陷中動脈任脈足厥陰之會中極一名玉泉一名氣原在臍下四寸膀胱募也足三陰任脈之會關元一名次門一名下紀在臍下三寸此穴當人身上下四旁之中故又名大中極乃男子藏精女子蓄血之處小腸募也足三陰陽明任脈之會千金云治久痢百治不瘥灸三百壯分十日灸之又治冷痢腹痛及臍下結痛流入陰中發作無時仍灸天井百壯神農經云治痃癖氣痛可灸二十一壯石門一名命門一名丹田一名精露一名利機在臍下二寸三焦募也氣海一名脖胦一名下肓在臍下一寸半宛宛中肓之原也為男子生氣之海刺八分灸五壯此氣海也凡臟氣憊一切真氣不足久疾不瘥者悉皆灸之甲乙經曰刺一寸三分一日灸百壯昔柳公度曰吾養生無他術但不使元氣佐喜怒使氣海常溫爾今人既不能不以元氣佐喜怒若能時灸氣海使溫亦其次也豫舊多病常若氣短醫者教灸氣海氣遂不促自是每歲一二次灸之則以氣怯故也陰交一名少關一名橫戶在臍下一寸一曰當膀胱上際三焦募也任沖少陰之會刺八分灸五壯一曰灸百壯主治衝脈生病從少腹衝心而痛不得小便疝痛陰汗濕癢奔豚腰膝拘攣婦人月事不調崩中帶下陰癢産後惡露不止繞臍冷痛神闕一名氣舍當臍中灸三壯禁刺刺之令人惡瘍潰矢死不治一曰納炒乾淨鹽滿臍上加厚薑一片蓋定灸百壯或以川椒代鹽亦妙千金云納鹽臍中灸三壯治淋又霍亂納鹽灸二七壯又灸神闕主治陰證傷寒中風不省人事腹中虛冷傷憊腸鳴泄瀉不止水腫鼓脹小兒乳痢不止腹大風癇角弓反張脫肛婦人血冷不受胎者灸此永不脫胎此穴在諸傢俱不言灸只云禁針銅人云宜灸百壯有徐平者卒中不省得桃源為灸臍中百壯始蘇更數月復不起鄭糾云有一親卒中風醫者為灸五百壯而蘇後年逾八十向使徐平灸至三五百壯安知其不永年耶故神闕之灸須填細鹽然後灸之以多為良若灸至三五百壯不惟愈疾而且延年若灸少則時或暫愈後恐復發必難灸矣但夏月人神在臍乃不宜灸水分一名分水一名中守在下脘下一寸臍上一寸當小腸下口至是而泌別清濁水液入膀胱渣滓入大腸故曰水分下脘在建里下一寸臍上二寸當胃下口小腸上口足太陰任脈之會建里在臍上三寸中脘下一寸中脘一名太倉一名胃脘一名上紀在上脘下一寸臍上四寸居岐骨與臍之中胃之募也為腑之會手太陽少陽足陽明所生任脈之會此穴刺八分灸七壯一云二七壯至百壯此為腑會故凡腑病者當治之上脘在巨闕下一寸五分去蔽骨三寸臍上五寸足陽明手太陽任脈之會千金云日灸二七壯至百壯三報之神農經云治心疼積塊嘔吐可灸十四壯玉龍賦云閣中脘治九種之心疼巨闕在鳩尾下一寸心之募也千金云治吐逆不下食灸五十壯又治卒忤灸百壯神農經云治小兒諸癇病如口噦吐沫可灸三壯艾炷如小麥鳩尾一名𩩲骬一名尾翳在臆前蔽骨下五分人無蔽骨者從岐骨際下行一寸甲乙經曰一寸半膏之原也禁刺灸此穴大難下針非甚妙高手不可輕刺也中庭在膻中下一寸六分陷中仰而取之膻中一名元兒又一名上氣海在玉堂下一寸六分橫兩乳間陷中仰而取之禁刺灸七壯此穴乃氣之會也凡上氣不及下氣嗌氣膈氣痛之類均宜灸之玉堂一名玉英在紫宮下一寸六分陷中仰而取之刺三分灸五壯一云少灸主治胸膺滿痛煩咳喘急喉痹咽壅水漿不入等證紫宮在華蓋下一寸六分陷中仰而取之刺三分灸五壯治同玉堂華蓋在璇璣下一寸陷中仰而取之刺灸主治同上璇璣在天突下一寸陷中仰而取之刺灸主治同上天突一名玉戶在結喉下三寸宛宛中陰維任脈之會神農經云治氣喘咳嗽可灸七壯廉泉一名本池一名舌本在頷下結喉上中央舌本下仰而取之陰維任脈之會按刺瘧論所載曰舌下兩脈者廉泉也氣府論曰足少陰舌下各一衛氣篇曰足少陰之標在背腧與舌下兩脈然則廉泉非一穴當是舌根下之左右泉脈而且為足少陰之會也承漿一名天池一名懸漿在頤前下唇稜下陷中足陽明任脈之會刺二分留五呼灸三壯主治偏風半身不遂口眼喎斜口噤不開暴喑不能言刺三分徐徐引氣而出及治任之為病其苦內結男子為七疝女子為癥聚一云療偏風口喎面腫消渴飲水不休口齒疳蝕生瘡灸之亦佳日可七壯至七七壯止即血脈宣通其風應時立愈艾炷不必大但令當脈即能愈疾千金云小兒唇緊灸三壯百證賦云瀉牙疼而即移任脈之別名尾翳下鳩尾散腹實則腹皮痛虛癢搔取之所別注尾翳誤也任脈之絡名屏翳即會陰穴在大便前小便後兩陰之間任督沖三脈所起之處此經由鳩尾下行散腹故為病若此而治之者當取所別之會陰也督脈循行圖督脈循行主病歌督起少腹骨中央少腹胞宮之所居骨橫骨中央下近外之中央也入系廷孔絡陰器廷孔言中正之直孔即溺孔也女人孔在前陰中橫骨之下孔上際謂之端乃督脈外起之所此雖言女子然男子溺孔亦在橫骨下中央循宗筋而出莖端也別絡自溺孔之端循順分行向後也合篡至後別繞臀篡謂兩便爭行之所即前後二陰之間合者循陰器向後復合篡間分而為二繞行篡後之臀也與巨陽絡太陽中絡少陰比合少陰腎脈並行至股內後廉貫脊屬腎行相隨大腸起目內眥上額交巔絡腦間還出別下項循肩膊內仍俠脊抵腰中入循膂絡腎循男莖絡督之別絡並足太陽經上頭下項俠脊抵腰中復絡於腎若直行者自尻上循脊裡上頭由鼻而至人中也莖男子陰莖下篡亦與女子類又從少腹貫臍中央貫心入喉頤唇宮上頤還唇上系兩目下中央此為並任並任脈而行亦同沖大抵三脈同道起督衝任皆起於會陰之中下一原而三岐異名而同體靈素言之每錯綜五音五味篇曰衝任脈皆起胞中上循背裡是又言衝任行背故經亦有謂衝任脈為督脈者古圖經有以任脈循背謂之督自少腹直上者謂之任亦謂之督今人大率以行身背者為督行身前者為任俠臍膀左右上行者為沖然循任督二經所行穴道一在身前一在身後而衝脈居中本無穴道伴行足少陰腎經穴道似當以此説為正督病少腹上衝心痛不得前後二便不通沖疝攻此督脈為病而兼於衝任二脈之症其在女子為不孕沖為血海任主胞脈嗌乾脈衝咽喉遺溺及痔癃絡陰器合篡間此督脈為病同於衝脈考督脈生病治督脈骨上臍下可收功骨上橫骨上毛際下曲骨穴臍下謂臍下一寸陰交穴皆任脈之穴其治而言督何也蓋督衝任三脈同一體督即任沖之綱領任沖即督之別名也故言治若此別絡病實則脊強虛而頭重高搖空注見別絡之後督脈穴圖脈長四尺五寸督脈穴歌督脈行背之中行二十八穴始長強腰俞陽關入命門懸樞脊中中樞長筋縮至陽歸靈臺神道身柱陶道開大椎啞門連風府腦戶強間後頂排百會前頂通囟會上星神庭素髎對水溝兌端在唇上齦交上齒縫之內凡取脊間督脈諸穴當於骨節突處取之但驗於魚骨為可知也若取於節下必不見效按督脈始於長強者本自靈樞經脈篇曰督脈之別名長強俠脊上項散頭上下當肩胛左右別走太陽入貫膂難經二十八難曰督脈者起於下極之俞並於脊裡之上至風府入屬於腦乃指穴而言也前論督脈起於少腹者是指循行而言也取穴分寸並別長強一名氣之陰郤一名撅骨靈樞謂之窮骨亦名尾骶在脊骶骨端伏地取之督脈之絡別走任脈足少陰所結一云足少陰少陽之會千金翼云治赤白下痢灸窮骨頭百壯多多惟佳又下漏五痔疳蟲食下部刺三分伏地取之以大痛為度灸亦良日三十壯至七日止但不及針又灸尾翠骨七壯治脫肛神良千金作龜尾即窮骨也此穴為五痔之本腰俞一名腰柱一名背解一名腰戶一名隨室在二十一椎節下間宛宛中千金云腰卒痛去窮骨上一寸灸七壯者即此陽關在十六椎節下間伏而取之甲乙經無此穴命門一名屬纍在十四椎節下間伏而取之一云平臍用線牽而取之千金云腰痛不得動者令病人正立以竹杖拄地度至臍乃取杖度背脊灸杖頭盡處隨年壯良丈夫痔漏下血脫肛不食長泄痢婦人崩中出血帶下淋濁赤白皆灸之此俠兩旁各一寸橫三間寸灸之標幽賦云兼肝俞能使瞽士視秋毫之木懸樞在十二椎節下間伏而取之脊中一名神宗一名脊俞在十一椎節下間俯而取之中樞在第十椎節下間俯而取之此穴諸書皆失之惟氣府論督脈下王氏注中有此穴及考之氣穴論曰背與心相控而痛所治天突與十椎者其穴即此筋縮在九椎節下間俯而取之至陽在七椎節下間俯而取之刺五分灸三壯主治腰脊強痛胃中寒不食少氣胸脅支滿羸瘦身黃淫濼脛酸四肢重痛寒熱解㑊靈臺在六椎節下間俯而取之甲乙經無此穴出氣府論注神道在五椎節下間俯而取之身柱在三椎節下間俯而取之刺五分留五呼灸五壯一曰灸七七壯主治腰脊痛癲癇狂走怒欲殺人瘛瘲身熱妄言見鬼小兒驚癇神農經云治頦嗽可灸十四壯陶道在大椎節下間俯而取之督脈足太陽之會大椎一名百勞在第一椎上陷者中一曰平肩手足三陽督脈之會大椎為骨會骨病者可灸之千金云凡瘧有不可瘥者從未發時前灸大椎至發時滿百壯無不瘥時傳以此治百病神農經云治小兒急慢驚風啞門一名喑門一名舌厭一名舌橫在項後入髮際五分宛宛中仰頭取之督脈陽維之會入系舌本禁灸灸之令人啞風府一名舌本在項上入髮際一寸大筋內宛宛中疾言其肉立起言休其肉立下督脈陽維之會熱論曰巨陽者諸陽之屬也其脈連於風府此穴刺三分留三呼禁灸灸之令人喑席弦賦云風府風池尋得到傷寒百病一時消又云從來風府最難尋須用功夫度淺深倘若膀胱氣未散更宜三里穴中尋腦戶一名匝風一名會額一名合顱在枕骨上強間後一寸五分一曰在髮際上二寸督脈足太陽之會禁刺灸刺中腦戶入腦立死強間一名大羽在後頂後一寸五分後頂一名交沖在百會後一寸五分枕骨上百會一名三陽五會一名巔上一名天滿在前頂後一寸五分頂中央旋毛心容豆許直兩耳尖上對是穴督脈足太陽之會手足少陽足厥陰俱會於此刺二分灸五壯甲乙經曰刺二分灸三壯一曰灸頭頂不得過七七壯主治頭風頭痛耳聾鼻塞鼻衄中風言語蹇澀口噤不開或多悲哭偏風半身不遂風癇卒厥角弓反張吐沫心神恍惚驚悸健忘痎瘧女人血風胎前産後風疾小兒風癇驚風脫肛久不瘥一曰百病皆治宜刺此二分得氣即瀉若灸至百壯停三五日後繞四畔用三稜針出血以井花水淋之令氣宣通否則恐火氣上壅令人目暗一曰治悲笑欲死四肢冷氣欲絶身口溫可針人中三分灸百會三壯即蘇史記載扁鵲治虢太子尸厥針取三陽五會而蘇席弘賦云小兒脫肛患多時先灸百會後尾骶前頂在囟會後一寸五分骨陷中一云在百會前一寸神農經云治小兒急慢驚風可灸三壯艾炷如小麥囟會在上星後一寸陷中刺二分灸五壯一曰灸二七至七七壯小兒八歲以前禁針蓋其囟門未合刺之不幸令人夭千金云邪病鬼癲囟上主之一名鬼門神農經云治頭風疼痛可灸三壯小兒急慢驚風灸三壯炷如小麥一云頭風生白屑多睡針之彌佳針訖以末鹽生麻油相和揩髮根下頭風永除上星一名神堂在鼻直上入髮際一寸陷中可容豆千金云鼻中息肉灸二百壯一云宜三稜針出血以瀉諸陽熱氣神庭直鼻上入髮際五分發高者髮際是穴發低者加二三分督脈足太陽陽明之會禁刺灸三壯專理頭風素髎一名面王在鼻端準頭刺一分禁灸主治鼻中息肉不消喘息不利多涕喎噼衄血一曰治酒酢風用三稜針出血水溝一名人中在鼻下溝中央近鼻孔陷中督脈足陽明之會刺三分留六呼得氣即瀉灸三壯至七壯炷如小麥然灸不及針主治中風口噤牙關不開卒中惡邪鬼擊不省人事癲癇卒倒消渴多飲水氣遍身浮腫瘟疫口眼喎噼俱宜刺之若風水面腫針此一穴出水盡即愈神農經云小兒急慢驚風可灸三壯炷如小麥兌端在上唇端甲乙經曰手陽明脈氣所發刺二分留六呼灸三壯炷如大麥治齒齦痛口瘡臭不可近齦交齦音銀齒根肉在唇內上齒縫中任督二經之會逆刺三分灸三壯治鼻息牙疳小兒面瘡督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也別者別走任脈足少陰者也本經上頭項走肩背故為病如此頭重高搖之謂力弱不勝而顫掉也治此者當取所別之長強衝脈循行圖衝脈循行主病歌經文附注內衝起氣街並少陰起言脈外所起非發源之謂也氣街一名氣衝在少腹毛際兩旁各二寸橫骨兩端動脈宛宛中足陽明穴也並少陰穴合皆云足少陰之會俠臍上行胸中散俠臍左右五分而上至胸中而散會於咽喉別而絡唇口此言衝脈之前行者也沖為五臟六腑海沖為血海痿論曰經脈之海也主滲溪谷與陽明合於宗筋海論曰十二經脈之海也其輸上注於大杼下出於巨虛之上下廉五臟六腑皆稟氣上出頏顙滲諸陽經灌諸精從下衝上取茲義故名沖其有並腎下行者注少陰大絡氣街出循陰股內廉入膕中膝後曲處伏行骭骨內踝際下滲三陰肝脾腎灌諸絡以溫肌肉至跗指逆順肥瘦篇曰並少陰氣街循陰股入膕中伏行骭骨內下至內廉之後屬而別其下者並少陰經滲三陰其前者伏行出跗屬循跗入足大指間滲諸絡而溫肌肉別絡結則跗上不動不動則厥厥則寒矣總之內外布周身前後上下無不至衝脈之下行者雖會於陽明之氣街而實並於足少陰之經且其上自頭下自足後自背前自腹內自溪谷外自肌肉陰陽表裡無所不涉又歲露篇曰入脊內注於伏沖之脈百病始生篇曰傳舍於伏沖之脈所謂伏沖者以其最深也故凡十二經之氣血此皆受之以營養周身所以為五臟六腑之海氣不順時血泣凝為病逆氣裡急是衝脈俠臍上行至於胸中故其氣不順則膈塞逆氣血不和則胸腹裡急矣衝脈總釋衝脈起於腹氣之街者是謂氣所行之街也一身之大氣積於胸中者有先天之真氣是所受者即人之腎間動氣也有後天之宗氣是水穀所化者即人之胃氣也此所謂起於腹氣之街者是起胃中谷氣也並於少陰是並於腎間動氣真氣與穀氣相併俠臍上行胸中而散是大氣分布五臟六腑諸經而充周身也衝脈穴圖穴位尺寸見足少陰腎經衝脈穴歌衝脈俠臍起橫骨大氣四注肓俞同商石陰通幽門穴至胸散布仍流行陽蹺脈循行圖陽蹺脈循行主病歌經文附注內陽蹺太陽之別脈脈氣所發起跟中上合三陽循外踝二十八難曰陽脈者起於跟中循外踝上行入風池從脅循肩與頄通會目內眥太陽地上入髮際下耳終陽蹺之脈起跟中上合手陽明手太陽足陽明從脅少陽循肩入頸頄會任脈承泣屬目內眥而會太陽也陰緩陽急陽蹺病邪客陽蹺目內疼靈樞經曰陽蹺而上行氣並相還則為濡目素問繆刺論曰邪客於足陽蹺之脈令人目痛從內眥始陽蹺脈穴圖陽蹺脈穴歌陽蹺穴起申僕陽居髎肩髃巨骨鄉臑俞地倉巨髎泣終於睛明一穴強陽蹺脈分寸歌陽蹺脈起足太陽申脈外踝五分藏僕參後繞跟骨下附陽外踝三寸鄉居髎監骨上陷取肩髃一穴肩尖當肩上上行名巨骨肩胛之上臑俞坊口吻旁四地倉位鼻旁八分巨髎疆目下七分是承泣目內眥出睛明昂蹺者足也奇經涉於足者之名也曰陽者以其所行陽經也陽蹺者謂足太陽經之別脈也起足太陽膀胱經足外踝下五分陷中申脈穴繞後跟骨下僕參穴又前斜足外踝上三寸跗陽穴又與足少陽會於季脅軟骨端下八寸三分居髎穴又與手足太陽陽維會於肩後大骨下胛上廉臑俞穴又與手足陽明會於膊骨頭肩端上肩髃穴又上行肩尖上兩叉骨巨骨穴又與手足陽明會夾口吻旁四分地倉穴行於鼻孔旁八分巨髎穴又與任脈足陽明會於目下七分承泣穴又與手足太陽足陽明陰蹺會於目內眥外一分睛明穴也陰蹺脈循行圖陰蹺脈循行主病歌陰蹺少陰之別脈然骨後起循內踝直上陰股入陰間入陰間即會陰穴張紫陽曰陰蹺脈在尾閭前陰囊下此脈才動諸脈皆通上由胸裡缺盆過出人迎胃經頸旁動脈前至咽喉二十八難曰陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈入頄顴內廉合陽內眥坐靈樞脈度篇曰蹺脈者少陰之別脈起於然骨之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還濡兩目氣不榮兮目不合二十九難著病情陽緩陰急細推著陰蹺脈穴圖陰蹺脈穴歌陰蹺起於然谷後上行照海交信列二穴原本足少陰足之太陽睛明接陰蹺脈分寸歌陰蹺穴起足少陰足內踝前然骨後踝下一寸照海真踝上二寸交信列陰蹺者以其所行陰經為足少陰之別脈也起於腎經足內踝前大骨下陷中然骨後上循內踝之下一寸照海穴又循太溪郤於足內踝之上二寸直行交信穴從交信上循至目內眥合於太陽陽蹺上行氣並相還則為濡目之用矣此陰蹺循行之經穴也考正陰蹺穴道壽田靈樞脈度篇曰蹺脈者少陰之別脈起於然谷之後上內踝之上直上入頄屬目內眥合於太陽陽蹺而上行非謂起於然谷穴而終於睛明穴也而李時珍乃謂起於然谷穴終於睛明穴張介賓類經亦紀然谷交信照海睛明四穴金鑑孚而合之獨針灸大成只有照海交信二穴左右凡四穴豫甚駭然悉難為則沉思細考圖經交信為陰蹺之郤照海乃陰蹺所生然谷無生郤會之語而睛明穴下氣府論注曰手足太陽陽明陽蹺五脈之會並無陰蹺會屬之文無他時珍先生之謂起於然谷穴者是誤看後字也終於睛明穴者是誤看屬目內眥合於太陽之合字也介賓類經亦紀然谷交信照海睛明四穴者是著書之繁冗失細諦之思也何者陰蹺之穴紀四而蹺脈分男女之注內按有云陰蹺為少陰之別脈起於照海穴由此觀之矛盾不期而見之也二先生者俱為後學之指南而著作猶有差失籲著作之難不誠然哉豫不揣遵圖經之交信照海為陰蹺之郤會者而繪紀之不知有小補於陰蹺之當否蹺脈數陰陽歌陽蹺男經女是絡陰蹺男絡女為經脈數陰陽分男女左右七尺五寸許靈樞曰脈有陰陽何脈當其數岐伯曰男子數其陽女子數其陰則知男子數左右之陽蹺女子數左右之陰蹺也長短數左右合一丈五尺陰脈營臟陽榮腑如環無端莫知紀氣之流溢表裡周內濡臟腑外腠理陽維脈循行圖陽維脈循行主病歌陽維起於諸陽會脈氣所發足太陽起於足太陽經外踝之下金門穴也從胻循腹背肩項頭面維絡會督場從胻謂自外踝上行會足少陽為郤循膝髀抵少腹側循脅肋肘會臂過肩會手少陽足陽明入肩後會手太陽陽蹺上循耳後上頭下額與手足少陽陽明五脈相會復循頭後會於督脈維絡諸陽以固其衛氣也假若陽不維陽絡溶溶不能自收藏收藏收持也陽維為病苦寒熱受邪在表衛不強出二十九難陽維脈穴圖陽維脈穴歌陽維脈起穴金門陽交日月臑俞經臂臑肩井天髎過風池腦空接承靈正營目窗並臨泣陽白仍還循本神風府啞門會督脈左右三十四穴成陽維脈分寸歌陽維穴起足太陽外踝一寸金門藏踝上七寸陽交郤肋端日月會少陽肩後胛上尋臑俞臂臑肘上七寸當肩上陷中肩井地天髎穴在缺盆鄉耳後陷中風池會枕骨之下腦空彰腦前寸五承靈市靈前一寸正營場目窗只隔正一寸入發五分臨泣詳陽白眉端一寸度本神入發四分量項後啞門入髮際入發一寸風府疆考正陽維穴道壽田粵稽陽維穴道類經凡十三穴則無日月臂臑承靈目窗四穴李時珍左右凡三十二穴有居髎臑會而無日月風府啞門三穴又考針灸大成穴凡三十四有臑會而無臂臑合諸家稽之圖經穴道無陽維之會郤者去之有陽維之會郤者紀之實得一十七穴左右亦成三十四矣今遵圖經穴屬逐一而縷明之金門穴足太陽之郤陽維別屬也起足外踝下一寸行於足少陽經之足外踝上七寸陽交穴乃陽維之郤也三肋端橫之日月穴足太陰少陽陽維之會又與手足太陽及蹺脈會於肩後大骨下胛骨上廉臑俞穴也肘上七寸之臂臑是手足太陽陽維之會又會於肩上陷中肩井穴缺盆中上毖骨際之天髎穴乃手足少陽陽維之會也耳後陷中之風池枕骨下之腦空腦前寸五之承靈靈前一寸之正營隔營一寸之目窗眉上一寸之陽白入發四分之本神俱屬少陽陽維之會足太陽少陽陽維三脈之會者入發五分之臨泣穴也項後入發之啞門入發一寸之風府二穴者系督脈陽維之會也約上諸穴實陽維之左右三十四穴也晰明於此求正後之賢者陰維脈循行圖陰維脈循行主病歌經文附注內陰維脈起諸陰交內踝上行築賓郤築賓足少陰經穴為陰維之郤其脈發於此處循腹至乳上咽喉維絡諸陰會任適脈終上至在頂前循腹謂自腨肉分中上循股內廉上行入小腹會足太陰厥陰少陰陽明上會足太陰循脅肋會足厥陰上胸膈挾咽喉與任脈會上至頂前而絡也不自相維志豪失二十八難曰陽維陰維者維絡於身溢蓄不能環流灌溉諸經者也故陽維起於諸陽之會陰維起於諸陰之交陽維維於陽陰維維於陰陰陽不能自相維則悵然失志溶溶不能自收持者也陰維為病苦心痛主治三陰可愈疾李瀕湖曰陽維之脈與手足三陽相維而足太陽少陽則始終相聯附者寒熱之證惟二經有之故陽維為病亦苦寒熱蓋衛氣晝行於陽夜行於陰陰虛則內熱陽虛則外寒邪氣在經內與陰爭而惡寒外與陽爭而發熱則寒熱之在表而兼太陽證者有汗當用桂枝無汗當用麻黃寒熱之在半表半裡而兼少陽證者當用小柴胡湯加減治之若夫營衛惵卑而病寒熱者黃耆建中及八物湯之類主之潔古獨以桂枝一證屬之陽維似未擴充至於陰維為病苦心痛潔古獨以三陰溫里之藥治之則寒之中三陰者宜矣而三陰熱厥作痛似未備矣蓋陰維之脈雖交三陰而行實與任脈同歸故心痛多屬少陰厥陰任脈之氣上衝而然暴痛無熱久痛無寒按之少止者為虛不可按近者為實凡寒痛兼少陰及任脈者四逆湯兼厥陰者當歸四逆湯兼太陰者理中湯主之凡熱痛兼少陰及任脈者金鈴散延胡索散兼厥陰者失笑散兼太陰者承氣湯主之若營血內傷兼夫任沖手厥陰者則宜四物湯養營湯妙香散之類因病藥之如此則陰陽虛實庶乎其不差矣陰維脈穴圖陰維脈穴歌陰維之穴起築賓府舍大橫腹哀循期門天突連舌本此是陰維脈維陰陰維脈分寸歌陰維脈起足少陰內踝之上尋築賓少腹之下稱府舍大橫平臍是穴名此穴去中三寸半行至乳下腹哀明期門直乳二肋縫天突結喉下一寸喉上中央舌本下穴名廉泉通腎津陰維起於諸陰之交者謂起於足少陰腎經之內踝後上腨分中築賓穴與足太陰交於少腹下去腹中行三寸半府舍穴又平臍去中行三寸半大橫穴又行至乳下二肋端縫之下二寸腹哀穴又與足厥陰交於乳下二肋端縫期門穴又與任脈交於結喉下一寸宛宛中天突穴從天突上行在頷下結喉上口中舌本下廉泉穴而終此陰維脈氣所發也帶脈循行圖帶脈循行主病歌經文附注內帶起季脅繞身行二十八難曰帶脈者起於季脅回身一周同足少陽之經循足少陽經帶脈之會圍身一周如束帶又與少陽會樞維樞維穴名靈樞説足少陰正上膕別走太陽經合腎十四椎屬帶經曰足少陰上至膕中別走太陽而合上至腎當十四椎出屬帶脈楊氏曰帶脈總束諸脈使不妄行如人束帶而下垂故名婦人惡露隨脈而下故謂之帶脈也脈氣所發是正名主病溶溶漫緩貌囊水狀婦女月事雜證侵明堂曰婦人腹痛裡急後重瘛瘲月事不調赤白帶下素問曰邪客於太陰之絡令人腰痛引小腹痛控䏚不可以養息王海藏曰女子經病血崩久而成枯者宜澀之益之血閉而成竭者宜益之破之破血有三治始則四物入紅花調黃耆肉桂次則四物入紅花調鯪鯉甲桃仁桂童子小便和酒煎服末則四物入紅花調易老沒藥散考正帶脈穴道壽田帶脈之穴李時珍謂起於季脅之章門循帶脈又與足少陽會於五樞維道左右凡八穴張介賓類經謂脈氣所發在季脅下一寸八分穴名帶脈又與足少陽會於維道凡四穴金鑑與針灸大成均言帶脈五樞維道凡六穴考之圖經帶脈五樞維道三穴屬帶脈之會章門穴乃脾之募臟之會非帶脈之會也時珍穴之四介賓穴之二較之圖經俱有差失今遵圖經金鑑大成穴屬而縷繪之以質後之賢者帶脈穴圖帶脈穴歌帶起少陽帶脈穴繞行五樞維道間京門之下居髎上周回季脅束帶然帶脈分寸歌帶脈部分足少陽季脅寸八是其鄉由帶三寸五樞穴過章下三維道當帶脈穴在季脅下一寸八分從帶脈穴下三寸即五樞穴也從五樞下行過肝經之章門穴下五寸三分即維道穴也諸部經絡循行會通發明頭面部巔足太陽之脈交巔其支者從巔直者從巔足厥陰之脈內行與督脈會於巔手少陽之正別於巔足少陽之筋交巔上督脈上額交巔上俱見經絡類腦髓足太陽之脈直者入絡腦足陽明循眼系絡腦督脈入絡腦諸髓者皆屬於腦腦為髓之海經絡腦者陰也髓者骨之充也髓者以腦為主肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦疾病氣在頭者止之於腦經絡額顱足陽明之脈循髮際至額顱足太陽之脈上額足厥陰之脈上出額足少陽之筋直者上額角手少陽之筋結於角俱經絡手足少陰太陰足陽明此五絡皆上絡左角針刺頭足少陽之脈上抵頭角足太陽之筋直者上頭手陽明之筋直者上左角絡頭督脈之別散頭上頭氣有街俱見經絡類陰氣從足上行至頭陽氣從手上行至頭頭者睛明之府俱疾病三陽在頭脈色面任脈循面足少陽之別散於面手少陰之正出於面經絡類諸陽之會皆在於面疾病十二經脈三百六十五絡其血氣皆上於面而走空竅心者生之本其華在面臟象類目附命門目者肝之官也脈色東方色青入通於肝開竅於目東方生風在竅為目臟象敷和之紀其主目運氣任脈入目督脈與太陽起於目內眥其少腹直上者上系兩目之下蹺脈屬目內眥氣不營則目不合經絡類足太陽之脈有通項入於腦者正屬目本名曰眼系陰蹺陽蹺陰陽相交陽入陰陰出陽交於目鋭眥陽氣盛則瞋目陰氣盛則瞑目針刺足太陽之脈起目內眥足太陽之筋支者為目上綱足陽明之筋上合於太陽為目下綱足陽明之正還系目系足太陽之脈起目鋭眥支者至鋭眥後足少陽之筋支者結於目眥為外維足少陽之正系目系合少陽於外眥足厥陰脈之內行連目系手太陽之脈至目鋭眥支者至目內眥手少陽脈之支者至目鋭眥手少陰脈之支者系目系手少陰之正合目內眥手少陰之別系目系俱經絡類手陽明之別者合於宗脈經脈肝氣通於目肝和則目能辨五色矣平旦陰盡陽氣出於目目張則氣上行於頭夜則氣行於陰而復合於目諸脈者皆屬於目經絡類其精陽氣上走於目而為睛臟象心者五臟之專精也目者其竅也目者宗脈之所聚也上液之道也五臟六腑目為之候五臟六腑之精液盡上滲於目五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也目者心使也俱疾病類命門足太陽之標在兩絡即睛明穴結於命門命門者目也經絡手太陽之標在命門之上一寸鼻附天牝鼻者肺之官也脈色西方白色入通於肺開竅於鼻腫主鼻在竅為鼻臟象審平之紀其主鼻運氣手陽明脈之支者上挾鼻孔足陽明之脈起於鼻之交頞中下循鼻外手太陽脈之支者抵鼻足陽明之筋下結於鼻足太陽之筋結於鼻俱經絡類其宗氣上出於鼻而為臭臟象肺氣通於鼻肺和則鼻能知香臭矣經絡天牝天牝從來復得其往天牝鼻也耳耳者腎之官也脈色南方赤色入通於心開竅於耳腎主耳在竅為耳臟象足太陽脈之支者至耳上角足陽明之脈循頰車上耳前足陽明之筋其支者結於耳前足少陽之脈下耳後支入耳中出耳前足少陽之筋出太陽之前循耳後足少陽之標在窗籠者耳也手太陽脈之支者入耳中手少陽脈之支者系耳後出耳上角又支從耳後入耳中出耳前手太陽之筋結於耳後完骨支者入耳中直者出耳上手厥陰之正出耳後合少陽完骨之下手陽明之別者入耳合於宗脈俱經絡類手足少陰太陰足陽明五絡皆會於耳中上絡左角針刺十二經脈三百六十五絡其彆氣走於耳而為聽臟象耳者宗脈之所聚也疾病腎氣通於耳腎和則耳能聞五音矣經絡枕骨足太陽之筋直者結於枕骨足少陰之筋循脊中結於枕骨與足太陽之筋合經絡完骨足太陽之筋支者上結於完骨手太陽之筋支者結於耳後完骨手厥陰之正出耳後合少陽完骨之下俱經絡類顴手太陽之脈斜絡於顴經絡頄足太陽之筋支者下結於頄足陽明之筋直者合於頄手陽明之筋支者結於頄足少陽之筋直者上結於頄蹺脈入頄經絡䪼手太陽之脈支者上䪼手少陽脈之支者至䪼足少陽脈之支者抵於䪼足陽明之正上䪼經絡頰手陽明脈之支者貫頰手太陽脈之支者循頸上頰手少陽脈之支者下頰手少陽之筋其支者當曲頰手陽明之別上曲頰足少陽脈之支者下加頰車足陽明之脈循頰車足厥陰脈之支者下頰裡俱見經絡頤任脈上頤督脈上頤足陽明之脈循頤後下廉足少陽之別出頤頷中俱經絡頷足少陽之筋下走頷手太陽之筋結於頷手少陽之筋上乘頷手陽明之筋直者下右頷俱經絡顏足太陽之筋下顏手陽明之標在顏下經絡人中手陽明脈之支者交人中經絡承漿足陽明之脈下交承漿經絡喉口唇舌部咽喉人有二喉一軟一硬軟者居後是謂咽喉乃水穀之道通於六腑者也硬者居前是謂喉嚨為宗氣出入之道所以行呼吸通於五臟者也任脈至咽喉足陽明脈之支者循喉嚨督脈入喉經絡衝脈任脈會於咽喉臟象足少陰脈之直者循喉嚨足厥陰脈之內行循喉嚨之後足少陽之別上挾咽足陽明之正上循咽足陽明挾咽之動脈足太陰之正合於陽明上行結於咽手少陰脈之支者上挾咽手太陽脈之內行循咽手少陰之正上走喉嚨手厥陰之正出循喉嚨手陽明之正上循喉嚨太陽之正循喉嚨上焦並咽以上俱經絡類咽喉者水穀之道也喉嚨者氣之所以上下者也針刺頏顙頏頸也頏顙即頸中之喉顙當咽喉之上懸雍之後張口可見者也顙前有竅息通於鼻故為分氣之所泄足厥陰之脈內行上入頏顙足陽明之標在人迎頰挾頏顙也經絡衝脈上者出於頏顙針刺頏顙者分氣之所泄也嗌足太陰脈絡嗌疾病足陽明之別合諸經之氣下絡喉嗌經絡地氣通於嗌陰陽會厭厭小而疾薄則發氣疾其開闔利厭太而厚則開闔難其氣出遲足之少陰絡於橫骨終於會厭針刺會厭者聲之戶也針刺口中央黃色入通於脾開竅於口脾主口在竅為口臟象備化之紀其主口運氣手陽明脈之支者挾口足陽明之脈挾口足陽明之正出於口脾氣通於口脾和則口能知五穀矣經絡衝任之脈絡唇口臟象唇脾之合肉也其榮唇也脾胃大小腸三焦膀胱者倉廩之本其華在唇四白臟象口唇者脾之官也脈色唇舌者肌肉之本也疾病口唇者音聲之扇也針刺舌舌者心之官也脈色中央黃色入通於脾開竅於口故病在舌本心主舌在竅為舌臟象升明之紀其主舌運氣足少陰之脈貫腎系舌本疾病足太陰之脈連舌本散舌下足太陰之正貫舌中足少陰之脈挾舌本足少陰之正直者系舌本足少陰之標在背腧與舌下兩脈足少陰舌下經絡足之少陰上繫於舌針刺足太陰之標在背腧與舌本足太陽之筋支者別入結於舌本手少陰之別系舌本手少陽之筋支者入系舌本上焦上至舌經絡厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本疾病其濁氣出於胃走唇舌而為味臟象心氣通於舌心和則舌能知五味矣經絡舌者音聲之機也懸雍垂者音聲之關也懸雍垂者懸而下垂俗謂之小舌當氣道之沖為喉間要會故謂之關橫骨者神氣所使主發舌者也即喉上之軟骨連心肺故為神氣所使上連舌本故主發舌機齒牙足陽明之脈下循鼻外入上齒中足陽明之動脈循牙車經絡足太陽脈亦有入遍齒者名曰角孫上齒齲取之針刺手陽明脈之支者入下齒中手陽明之別遍齒經絡臂陽明有人遍齒者名曰大迎下齒齲取之針刺手少陽之筋支者上曲牙經絡齒者骨之所終也氣味頸肩部項頸督脈之別上項督脈還出別下項足太陽之脈下項足太陽之筋上項足少陽之脈循頸足太陽之正直者從膂上出於項足陽明之別上頭項足少陽之筋挾膂上至項足少陰之正系舌本復出於項手太陽脈之支者循頸手太陽之筋其支者循頸手陽明脈之支者從缺盆上頸手陽明之筋直者從肩髃上頸手少陽脈之支者上項頸中央之脈督脈也肌肉之精為約束裹擷筋骨血氣之精而與脈系後出於項中疾病肩足太陽脈之直者循肩膊內支者下貫腫足太陽之筋支者結於肩髃足少陽之脈至肩上手太陽之脈繞肩胛交肩上手太陽之別絡肩髃手少陽之脈循臑外上肩手陽明之脈上肩手陽明之筋結於髃其支者繞肩胛手陽明之別上乘肩髃手太陰之筋結肩前髃督脈之別當肩胛左右走太陽督脈循肩膊俱見經絡類缺盆足陽明脈之支者入缺盆足陽明之筋至缺盆而結足少陽之脈入缺盆足少陽之筋結於缺盆足太陽之筋上出缺盆手太陽之脈入缺盆手陽明之脈下入缺盆手少陽之脈出入缺盆手太陰之正上出缺盆俱經絡類五臟六腑心為之主缺盆為之道臟象胸足少陽脈之支者內行下胸中足少陽脈之直者循胸足少陰脈之支者注胸中足太陰之筋散胸中手厥陰之脈起胸中手太陰之筋入腋散胸中手少陽之別注胸中手少陰之筋結下胸中手太陰之筋下結胸裡手心主之正別下淵腋三寸入胸中脾之大絡布胸衝脈俠臍上行至胸中而散蹺脈上循胸裡俱見經絡膻中手少陽之脈布膻中足厥陰經絡於膻中經絡膻中者心主之宮城也疾病膈手太陽之脈下膈手少陽之脈下膈手厥陰之脈下膈足少陽脈之支者貫膈足太陰之脈上膈足厥陰之脈上貫膈足陽明脈之支者下膈足少陰脈之直者從腎上貫肝膈俱經絡乳足陽明脈之直者下乳內廉足少陽之筋繫於膺乳手陽明之正從手循膺乳手少陰之筋交太陰挾乳里俱經絡胃之大絡名曰虛里出左乳下脈色腰足太陽脈之直者抵腰中足少陰之別貫腰督脈挾脊抵腰中經絡腰者腎之府也疾病脅肋部腋足少陽脈之直者下腋足少陽之筋其直者上走腋前廉足太陽之筋支者從腋後外廉入腋下手太陰之脈橫出腋下手少陰脈之直者下出腋下手厥陰脈之支者抵腋下手太陽之正入腋走心手少陰之正別入淵腋兩筋之間手心主之正別下淵腋三寸入胸中手太陰之正別入淵腋少陰之前入走肺手太陽之筋入結於腋下手少陰之筋上入腋手太陰之筋入腋下手厥陰之筋結腋下其支者入腋手太陰之標在腋內動也手心主之標在腋下脾之大絡名大包出淵腋下三寸上焦布胸中走腋俱經絡脅足少陽脈之支者循脅裡直者過季脅足厥陰之脈布脅肋足陽明之筋上循脅足少陽之筋其直者上乘䏚季脅足少陽之正別者入季脅之間手太陰之筋下抵季脅手厥陰脈之支者出脅手厥陰之筋前後挾脅脾之大絡布脅俱經絡肋足太陰之筋循腹裡結於肋經絡四肢部四肢四肢皆稟氣於胃而不得至經必因於脾乃得稟也疾病四肢者諸陽之本也疾病手大指手太陰之脈出手大指端經絡三陰在手脈色陰氣從足上行至頭而下行循臂至指端疾病手食指手太陰脈之別絡直出次指內廉出其端手陽明之脈起大指次指端經絡手中指手厥陰之脈循中指出其端經絡手名指手厥陰脈之支者循小指次指出其端手少陽之脈起小指次指之端經絡手小指手太陽之脈起小指之端經絡手少陰之脈循小指之內出其端經絡手掌手太陰之別直入掌中手少陰之脈抵掌後鋭骨之端入掌內後廉手厥陰之脈入掌中經絡手腕手太陰之脈從腕後手太陽之脈循手外側上腕手少陽之脈循手表手太陽之筋結於腕手少陽之筋結於腕中手陽明之筋結於腕手太陰之別名列缺起腕上手少陰之別名通里去腕寸半別而上行手心主之別名內關去腕二寸出兩筋間手太陽之別名支正上腕五寸內注少陰手陽明之別名偏歷去腕三寸入太陰手少陽之別名外關去腕二寸外繞臂俱經絡合谷手陽明之脈出合谷兩骨間經絡寸口手太陰之筋循大指上行結於魚後行寸口外側手太陰之本在寸口之中經絡手踝手太陽之脈循手外側出踝中經絡肘手太陽之脈出肘內側兩筋之間手陽明之脈入肘外廉手少陽之脈上貫肘手太陰之脈行心主之前下肘中手少陰之脈下肘內手太陰之筋結肘中手太陰之筋結於肘內鋭骨之後彈之應手小指之上手少陰之筋上結肘內廉手少陽之筋結於肘手陽明之筋結於肘外手厥陰之筋與太陰並行結於肘內廉手太陽之別上走肘手陽明之本在肘骨中手陽明少陽之大絡起於五指間上合肘中俱見經絡臂手太陽之脈循臂骨下廉手太陰之脈循臂內手少陰之脈循臂內後廉手少陽之脈出臂外兩筋之間手陽明之脈循臂上廉手厥陰之脈下臂行兩筋之間手太陰之筋上循臂手陽明之筋上循臂上手陽明之別上循臂手太陽之筋上循臂內廉手少陽之筋循臂手少陰之筋循臂手厥陰之筋上臂陰其支者結於臂手少陽之正外繞臂俱經絡臑手太陽之脈上循臑外後廉手陽明之脈上臑外前廉手少陽之脈循臑外手太陰之脈下循臑內手少陰之脈下循臑內後廉手厥陰之脈循臑內行太陰少陰之間手太陰之筋上臑內廉手陽明之筋上臑手少陽之筋上繞臑外廉俱見經絡足陽氣從手上行至頭而下行至足陽氣起於足五指之表陰脈者集於足下而聚於足心陰氣起於五指之裡集於膝下而聚於膝上疾病足大指足太陰之脈起於大指之端循內側足陽明脈之支者入大指出其端足少陽脈之支者別跗上入大指之間出其端還貫爪甲出三毛足厥陰之脈起大指叢毛之際足太陰之筋起於大指之端內側足厥陰之筋起於大指之上衝脈入足大指俱見經絡足中指足陽明脈之支者入中指內間口又者入外間足陽明之筋起於中三指經絡足名指足少陽脈之直者入小指次指之間足少陽之筋起於小指次指經絡足小指足太陽脈之支者循京骨至小指外側足少陰之脈起於小指之下邪走足心足太陽之筋起於足小指足少陰之筋起於小指之下經絡足心足少陰之脈邪走足心衝脈入足下經絡足本節足太陰之別名公孫去本節後一寸走陽明經絡足跗足陽明脈之支者下足跗足少陽脈之直者循足跗上足厥陰之脈上循足跗上廉足陽明之筋結於跗上衝脈別者出跗屬上下經絡足少陽之別下絡足跗經絡足跟足太陽之筋上循跟足少陰之脈循內踝之後別入跟中經絡足少陰之別當踝後繞跟別走太陽經絡踵足太陽之筋循足外踝結於踵足少陰之筋並足太陰之筋結於踵經絡內踝足太陰之脈上內踝前廉足太陰之筋上結於內踝足厥陰之脈上踝八寸交出太陰之後足厥陰之筋上結於內踝之前足少陰之筋並足太陰之筋邪走內踝之下足少陰之別名大鐘當踝後繞跟走太陽足厥陰之別名蠡溝去內踝五寸走少陽衝脈並少陰之經下入內踝之後蹺脈上內踝之上經絡外踝足太陽脈之支者出外踝之後足少陽脈之直者下出外踝之前足太陽之筋上結於踝足少陽之筋上結外踝足太陽之別名飛陽去踝七寸別走少陰足少陽之別名光明去踝五寸走厥陰足陽明之別名豐隆去踝八寸走太陰俱見經絡足脛足陽明脈之支者循脛外廉足太陰之脈循脛骨後足少陽之筋上循脛外廉足厥陰之別循脛足厥陰之筋上循脛足陽明之別循脛骨外廉足陽明之筋上循骭衝脈循脛骨內廉溫足脛脛氣有街俱見經絡衝脈下者伏行骭骨內針刺腨足太陽脈之支者下貫腨內足少陰之脈上腨內足太陽之筋別者結於腨外三焦下腧上踝五寸別入貫腨腸三焦下腧即足太陽之別絡膝足陽明脈之支者下膝臏中足太陰之脈上膝股內前廉足少陽脈之直者出膝外廉足太陽之筋自外踝邪上結於膝足陽明之筋上結於膝外廉俱見經絡膝者筋之府疾病輔骨足少陽脈之直者下外輔骨之前足陽明之筋其支者結於外輔骨合少陽足太陰之筋直者結於膝內輔骨足少陰之筋與太陽之筋合而上結於內輔之下足少陽之筋支者別起外輔骨足厥陰之筋上結內輔之下經絡膕中足太陽脈之支者從後廉下合膕中足少陰之脈出膕內廉足厥陰之脈上膕內廉足太陽之正別入膕中足太陽之筋結於膕三焦下腧是足太陽之絡出膕中外廉衝脈邪入膕中俱見經絡足少陰之正至膕中別走太陽而合足太陽筋之別者上膕中內廉與膕中並經絡上廉下廉足陽明下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉大腸屬上小腸屬下足陽明胃脈也經絡大腸合於巨虛上廉小腸合於巨虛下廉針刺伏兔足陽明之筋直者上循伏兔足少陽之筋前者結於伏兔之上俱經絡股足少陰之脈上股內後廉足厥陰之脈循股陰足太陰之筋上循陰股足少陰並太陰之筋而上循陰股衝脈循陰股內廉俱見經絡髀足太陽脈之支者過髀樞循髀外足少陽之支者橫入髀厭中直者下合髀厭中以下循髀陽足陽明之正上至髀足少陽之正繞髀足少陽之筋其支者上走髀足陽明之筋結於髀樞其直者上結於髀足太陰之筋結於髀足太陰之正上至髀經絡節諸筋者皆屬於節經絡身形支節者臟腑之蓋也臟象所言節者神氣之所遊行出入也經絡溪谷肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣人有大骨十二分小溪三百五十四名經絡北方黑色入通於腎故病在溪臟象四肢八溪之朝夕也經絡四肢謂兩手兩足八溪謂手有肘腋足有胯膕乃四肢之關節故稱為溪朝夕者言人之諸脈髓筋血氣無不由此入而朝夕運行不離也四關附十二原十二原出於四關主治五臟五臟有疾當取之十二原經絡十二原肺之原出於太淵心之原出於大陵肝之原出於太衝脾之原出於太白腎之原出於太溪俱各二膏之原出於鳩尾肓之原出於脖胦各一經絡四末四末陰陽之會者此氣之大絡也經絡陽受氣於四末針刺四街四街者氣之徑路也左右左右者陰陽之道路也經絡能別左右是謂大道脈色皮毛肌肉部皮毛西方生燥在體為皮毛肺者氣之本其華在毛其充在皮肺之合皮也其榮毛也臟象審平之紀其養皮毛運氣肺合大腸大腸者皮其應腎合三焦膀胱三焦膀胱者腠理毫毛其應肺朝百脈輸精於皮毛臟象皮者脈之部也發腎者主蟄封藏之本其華在發腎之合骨也其榮發也臟象皮膚堅而毛髮長經絡肌三焦膀胱者倉廩之本其華在唇四白其充在肌臟象肉脾之合肉也中央生濕在體為肉臟象備化之紀其養肉運氣脾合胃胃者肉其應臟象肉為牆經絡筋骨血脈部筋爪東方生風在體為筋臟象敷和之紀其養筋運氣足厥陰絡諸筋肝之合筋也其榮爪也肝者罷極之本其華在爪其充在筋肝合膽膽者筋其應臟象筋為剛經絡筋者聚於陰器而脈絡於舌本疾病骨北方生寒在體為骨腎者主蟄封藏之本其充在骨腎之合骨也臟象骨為幹經絡靜順之紀其養在骨髓運氣骨者髓之府疾病血脈心者生之本其充在血脈心之合脈也南方生熱在體為脈臟象脈者血之府也脈色升明之紀其養血運氣心合小腸小腸者脈其應臟象血者神氣也經絡脈氣流經臟象臟腑部肺審平從革堅成之紀其臟肺運氣手太陰經屬肺手陽明之脈絡肺手少陰脈之直者上肺足少陰脈之直者入肺中足厥陰脈之支者上注肺諸氣者皆屬於肺經絡肺者氣之本脾氣散精上歸於肺臟象五臟之應天者肺肺者五臟六腑之蓋也經絡大腸手陽明經屬大腸手太陰之脈下絡大腸足太陰之別者入絡腸胃經絡大腸者傳道之腑胃足陽明經屬胃足太陰之脈絡胃手太陽之脈抵胃足厥陰之脈挾胃手太陰之脈循胃口手太陰之筋散貫賁大腸小腸皆屬於胃經絡足太陰脈貫胃屬脾疾病脾備化卑堅敦阜之紀其臟脾運氣足太陰經屬脾足陽明脈之支者絡脾經絡心升明伏明赫曦之紀其髒心運氣手少陰經起心中出屬心系手太陽之脈絡心足太陰脈之支者注心中足少陰脈之支者絡心足太陽之正循膂當心入散足少陽之正貫心足陽明之正上通於心手心主之別絡心系督脈上貫心諸血者皆屬於心經絡足太陽背俞注於心疾病小腸手太陽經屬小腸手少陰脈之內行絡小腸足太陰之別者入絡腸胃經絡膀胱足太陽經屬膀胱足少陰脈之內行絡膀胱三焦下腧並太陽之正入絡膀胱約下焦經絡三焦合入於委陽針刺腎靜順涸流流衍之紀其臟腎運氣足少陰經屬腎足太陽脈之內行絡腎足少陰之正別走太陽而合上至腎衝脈者十二經之海也與少陰之大絡起於腎下經絡腎合三焦膀胱臟象衝脈下者注少陰之大絡針刺胞絡者繫於腎疾病心包絡手厥陰經屬心包絡手少陽脈之內行散絡心包足少陰之別者上走心包經絡三焦手少陽經屬三焦手厥陰脈之內行絡三焦三焦下腧在於足大指之前少陽之後出於膕中外廉名曰委陽是太陽絡也手少陽經也三焦者足少陽太陽之所將太陽之別也手太陰之脈起中焦經絡膽足少陽經屬膽足厥陰脈之內行絡膽經絡肝敷和委和發生之紀其臟肝運氣足厥陰經屬肝足少陽脈之內行絡肝足少陰脈之直者上貫肝膈足少陽之正別者散之上肝經絡前後陰部二陰北方黑色入通於腎開竅於二陰臟象靜順之紀其主二陰運氣陰器足厥陰之脈過陰器足陽明之筋聚於陰器足太陰之筋直者聚於陰器足少陰之筋並太陰而上結於陰器足厥陰之筋結於陰器足厥陰之別者循脛上睪結於莖督脈起於少腹以下骨中央女子入系廷孔其絡循陰器合篡間繞篡後其男子循莖下至篡與女子等蹺脈循陰股入陰俱見經絡足厥陰脈循陰器而絡於肝前陰者宗筋之所聚太陰陽明之所合也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長疾病毛際足厥陰之脈入毛中足少陽脈之支者出氣街繞毛際足少陽之正入毛際合於厥陰經絡足厥陽之正上毛際任脈者起於中極之下以上毛際疾病睪足厥陰之別循脛上睪經絡邪在小腸者連睪系針刺臀足太陰之脈貫臀足太陽之筋上結於臀督脈別繞臀經絡肛足太陽之正下尻五寸別入於肛經絡尻足少陽之筋後者結於尻經絡
