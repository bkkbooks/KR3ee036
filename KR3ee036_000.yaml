body:
  text: 凡例一經脈為醫學之首務而內景為尤切何者洞垣窺藏之技世不再睹欲窺其臟探其腑必藉圖摸索故書以內景賦居前而圖居後兼且考定差訛合其經旨使學者熟讀其賦繼玩其圖然後深求乎靈素之臟象陰陽豈不彰明較著毫髮無遺也哉一銅人骨度經脈氣穴前賢已有圖而言之者惜乎其略而不詳惟介賓暨我朝御定醫宗金鑑悉而言之又皆散在針刺門而學者以針刺為失傳多置而不察不知百病之生也始於皮膚傳舍於絡傳舍於經傳舍於腧傳舍於伏沖之脈經曰治病必求其本者十二經脈也十二經脈又本之於軀殼腔子軀殼腔子又皮有分部脈有經紀筋有結絡骨有度量其所生病各異別其分部左右上下陰陽所在而病之終始得矣何可置而不察哉今頗深思研慮考正營行次序穴屬尺寸起止匯為四卷以示初學入門之首務焉一奇經八脈固為正經流溢之氣然內溫臟腑外濡腠理無一不相隨於上下苟不分圖別類何能得其旨趣李時珍闡其蘊奧非不獨開生面但其中所言帶脈陰蹺陽維三脈俱有差失用是裒合內經及諸名家釐正舛錯分圖立説非敢師心自用原俾循經者如明鏡之鑑物無一不照故也一經脈營行雖有圖分縷晰而會合周環殊難了了再於諸經分晰部位核其各經之循於頭者會通頭部循行面目頸項耳口唇舌胸脅背腹手肘足膝諸部至於溪谷左右四關四末十二原以及臟腑腧屬無不畢備可為頂門之針
