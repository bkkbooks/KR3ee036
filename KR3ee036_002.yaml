body:
  text: 卷二肺經循行圖肺經循行經文十二經脈俱出靈樞經脈篇肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端歌見穴圖後肺經穴圖左右共二十二穴脈長三尺五寸肺經臟象圖肺臟經文肺者相傅之官治節出焉其形四垂附著於脊之第三椎中有二十四空行列分布以行諸臟之氣為臟之長為心之蓋是經常多氣少血其合皮也其榮毛也開竅於鼻難經曰肺重三斤三兩六葉兩耳凡八葉主藏魄華元化曰肺者生氣之原乃五藏之華蓋肺葉白瑩謂為華蓋以覆諸藏虛如蜂窠下無透竅吸之則滿呼之則虛一呼一吸消息自然司清濁之運化為人身之槖籥肺經循行主病總歌手太陰肺中焦起中焦當胃中脘在臍上四寸之分手之三陰從臟走手皆自內而出也下絡大腸胃口行絡聯絡也十二經相通各有表裡凡在本經皆曰屬以此通彼皆曰絡當任脈水分穴之分肺脈絡於大腸自大腸而上覆循胃口即賁門也上膈屬肺從肺系膈膈膜也肺系即肺管橫出腋下膊之下脅之上曰腋腋下即中府之旁謂從肺系而橫出腋下也臑內縈膊之內側上至腋下至肘嫩突白肉曰臑天府俠白之次也前於心與心包脈手之三陰太陰在前厥陰在中少陰在後也下肘循臂骨下廉臑盡處為肘肘以下為臂肘臂之交曰肘中骨即掌後高骨下廉骨下側也遂八寸口上魚際寸口即太淵穴處手腕之前大指本節之間其肉隆起者為魚寸之前魚之後曰魚際穴大指內側爪甲根少商穴止支絡還從腕後出接次指交陽明經臂掌之交曰腕此本經別絡從腕後上側列缺穴直出次指之端而接乎手陽明經也此經多氣而少血是動則為喘滿咳動變也言變常而為病也肺主氣膨膨肺脹缺盆痛缺盆雖十二經之道路而肺為尤近故肺病則痛其穴在肩下橫骨陷中屬足陽明經兩手交瞀音茂為臂厥瞀木痛不仁也手太陰脈由中府出腋下行肘臂間故為臂厥肺所生病咳上氣喘渴煩心胸滿結渴當作喝言聲粗急也肺脈行厥陰心主之前掌心勞宮屬心包故有煩心胸滿之病臑臂之內前廉痛為厥或為掌中熱太陰之別直入掌中故為痛厥掌熱肩背痛是氣有餘手太陰筋結於肩藏附於背故邪氣盛則肩背痛小便數欠或汗出肺為腎母邪傷其氣故小便數而欠肺主皮毛而風寒在表故汗出中風氣虛亦痛溺色變少氣不足以報息肩背者上焦之陽分也氣虛則陽病故為痛為寒而怯然少氣金衰則水涸故溺色變黃赤母病及子也肺經穴歌手太陰經十一穴中府雲門天府列俠白尺澤孔最存列缺經渠太淵涉魚際直出大指端內側少商如韭葉取穴分寸中府一名膺中俞在雲門下一寸去任脈中行六寸乳上三肋間陷中動脈應手仰而取之肺之募也募結募也為經氣之所聚他仿此手足太陰之會雲門在巨骨下夾氣戶旁二寸去中行六寸陷中動脈應手舉臂取之脅肋煩滿徹痛喉痹癭氣臂不得舉可灸之天府在臂臑內廉腋下三寸動脈陷中以鼻取之俠白在天府下去肘上五寸動脈中手太陰之別尺澤千金一名鬼堂在肘中約文上屈肘橫文筋骨罅中動脈手太陰所入為合從此會合為合穴甄權云臂屈伸橫文間筋骨罅中不宜灸孔最在腕上七寸陷中手太陰之郄郄音隙與郤同地名注郤地謂開隙之地又骨肉之交也列缺在腕後側上一寸五分滑氏曰以手交叉當食指末筋骨罅中是穴千金云男子陰中疼痛尿血精出灸五十壯治偏風口眼喎斜手肘痛無力口噤不開痎瘧寒熱煩躁咳嗽喉痹嘔沫縱唇健忘驚癇善笑妄言妄見面目四肢癰腫小便熱痛四肢厥逆瘛瘲屍厥灸至壯百又馬丹陽天星十二穴云此穴善療偏頭患偏身風痹麻痰涎頻上壅口噤不開牙若能明補瀉應手疾如拿此手太陰之絡從腕後別走陽明直出食指內廉出其端凡人有反關脈者寸關尺三部正脈不見而見於列缺陽谿此經脈虛而絡脈滿千金翼謂陽脈逆反大於寸口三倍者是也經渠在寸口陷中手太陰所行為經又從而行為經穴太淵在手掌後陷中手太陰所注為腧即原也腧與輸通從此而注為輸穴脈會太淵每日平旦寅時脈從此始故一難曰寸口者脈之大會神農經曰治牙疼手腕無力疼痛可灸七壯魚際在手大指本節後內側陷中又云散脈中白肉際手太陰所溜為滎溜流通流如小水為滎穴一傳齒痛不能食飲左患灸左右患灸右男三女四少商在手大指內側端去爪甲角如韭葉白肉際宛宛中手太陰所出為井如水始出為井穴唐刺史成君綽忽項腫如升喉閉水粒不下甄權以三稜針刺之微出血立愈主治項腫喉痹煩心嘔噦心下滿汗出咳逆痎瘧振寒腹脹腸滿雀目不明唇乾唾沫引飲食不下寒慄鼓頷手攣指痛小兒乳蛾乾坤生意云此為十井穴凡初中風卒暴昏沉痰涎壅盛不省人事牙關緊閉藥水不下急目三稜針刺此穴乃少衝中衝關衝少澤商陽使血氣流行乃起死回生急救之妙訣正筋別本標手太陰之正別入淵腋少陰之前入走肺散之大腸上出缺盆循喉嚨復合陽明手太陰之正其內行者自天府別入淵腋由手少陰心經之前入內走肺散之大腸其上行者出缺盆循喉嚨復合於手陽明經手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下自大指而上皆本經經穴所行之分入腋下方與手少陰之筋合此上皆剛筋也出缺盆結肩前髃此自腋下上出缺盆行肩上三陽之前而結於肩之前髃上結缺盆下結胸裡散貫賁合賁下抵季脅此上行者自腋而上並足三陽之筋上結於缺盆下行者自腋入胸結於胸裡散貫於胃上口賁門之分與手厥陰之筋合下行抵季脅與足少陽厥陰之筋合也手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散於魚際此手太陰絡穴也不曰絡而曰別者以本經由此別走鄰經也太陰自此別走陽明其太陰本經之脈由此直入掌中散於魚際也其病實則手銳掌熱虛則欠㰦小便遺數取之去腕寸半別走陽明也㰦音去欠㰦張口伸腰也實因邪熱有餘虛因肺氣不足治此者取列缺謂實可瀉之虛可補之此太陰之絡別走陽明而陽明之絡曰偏歷亦入太陰以其相為表裡故互為注絡以相通也他經皆然手太陰之本在寸口之中太淵穴也標在腋內動也天府穴也大腸經循行圖大腸經循行經文大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔大腸經穴圖左右共四十穴脈長五尺大腸經腑象圖大腸經文大腸者傳道之官變化出焉迴腸當臍左回十六曲大四寸徑一寸寸之少半長二丈一尺受谷一斗水七升半廣腸傅脊以受迴腸乃出滓穢之路大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一是經常多氣多血難經曰大腸重二斤十二兩肛門重十二兩按迴腸者以其回疊也廣腸者即迴腸之更大者直腸者又廣腸之末節也下連肛門是為穀道後陰一名魄門總皆大腸也大腸經循行主病總歌手陽明經大腸脈次指內側起商陽次指大指次指即食指也手之三陽從手走頭循指上廉入合骨循巡繞也上廉上側也凡經脈陽行於外陰行於內合谷在大指次指岐骨間俗名虎口兩骨兩筋中間行腕中上側兩筋陷中陽谿穴也循臂上廉入肘外廉上臑外廉肩髃音隅肩端骨罅為肩髃前廉柱骨旁肩背之上頸項之根為天柱骨本經由肩髃上出膀胱之天柱會於督脈之大椎六陽經皆會於督脈之大椎故內經以此為會上會此下入缺盆內絡肺下膈屬大腸自大椎而前入足陽明之缺盆絡於肺中復下膈當臍旁天樞之分屬於大腸與肺相表裡支從缺盆上入頸斜貫兩頰下齒當耳下曲處為頰挾口人中交左右上挾鼻孔盡迎香人中即督脈之水溝穴由人中而左右互交上挾鼻孔者自禾髎以交迎香手陽明經止此乃自山根交承泣穴而接乎足陽明經也此經血盛氣亦盛是動頸腫下齒痛是主津液病所生大腸與肺為表裡肺主氣而津液由於氣化故凡大腸之或泄或秘皆津液所生之病而主在大腸也目黃大腸內熱口乾無津鼽衄動喉痹金燥痛在肩前臑大指次指痛不用手陽明之別者合於宗脈故目黃其他諸病皆本經之脈所及虛則寒慄不易復不易溫也有餘當脈熱腫痛大腸經穴歌手陽明穴起商陽二間三間合谷藏陽谿偏歷歷溫溜下廉上廉三里長曲池肘臑迎五里臂髎肩髃巨骨起天鼎扶突接禾髎終以迎香二十止取穴分寸商陽一名絕陽在手食指內側去爪甲角如韭葉手陽明所出為井乾坤生意云此為十井穴領腫喉痹鼽衄齒痛灸三壯二間一名間谷在食指本節前內側陷中手陽明所溜為滎主治領腫喉痹鼽衄齒痛灸三壯三間一名少谷在食指本節後內側陷中手陽明所注為輸合谷一名虎口在手大指次指歧骨間陷中手陽明所過為原神農經云治鼻衄目痛不明牙疼喉痹疥瘡可灸三壯至七壯並治小兒乳蛾陽谿一名中魁在手腕中上側兩筋間陷中手陽明所行為經偏歷在手腕後三寸手陽明絡別走太陰溫溜一名逆注一名蛇頭在手腕後小士五寸大士六寸大士小士謂大人小兒也明堂云腕後五寸六寸間手陽明郄下廉在曲池下四寸輔骨下去上廉一寸輔兌肉其分外斜上廉在三里下一寸曲池下三寸其分獨抵陽明之會外斜三里一名手三里在曲池下二寸兌肉之端按之肉起曲池十三鬼穴名鬼臣在肘外輔骨屈肘曲骨之中以手拱胸取之手陽明所入為合秦承祖明堂云主大人小兒遍身風疹痂疥肘髎在肘大骨外廉陷中與天井相併相去一寸四分五里在肘上三寸行向里大脈中央一云在天府下五寸臂臑在肘上七寸䐃肉端肩髃下一寸兩筋兩骨罅宛宛陷中平手取之手陽明絡也絡手少陽之臑會一曰手足太陽陽維之會明堂禁刺灸七壯主治臂痛無力寒熱瘰癧頸項拘急肩髃一名中肩井一名偏肩在膊骨頭肩端上兩骨罅陷中舉臂取之有空手太陽陽明陽蹺之會一曰足少陽陽蹺之會千金云灸癭氣左右相當男左十八右十七壯女右十八左十七壯再三以差止巨骨在肩尖上行兩叉骨間陷中手陽明陽蹺之會天鼎在頸中缺盆上直扶突後一寸甲乙經曰直扶突氣舍後一寸五分氣府論注曰在扶突後半寸灸三壯主治喉痹嗌腫不得食暴喑氣硬扶突一名水穴在頸當曲頰下一寸甲乙經曰在人迎後一寸五分仰而取之一云氣舍後一寸五分由此上貫頰入下齒中禾髎一名長頻直鼻孔下夾水溝旁五分灸三壯主治鼻瘡息肉鼻塞鼽衄迎香一名衝陽在禾髎上一寸鼻孔旁五分手足陽明之會正筋別本標手陽明之正從手循膺乳別於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明也此大腸與肺為表裡經脈相為一合也手陽明之正循胸前膺乳之間其內行者別於肩髃入柱骨由缺盆下走大腸屬於肺其上者循喉嚨復出缺盆而合於陽明本經也手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃自食指尖而上皆本經經穴所行之次上臑會與足太陽之筋合結於肩髃此皆剛筋也其支者繞肩胛挾脊此支自肩髃屈曲後行繞肩胛與手足太陽之筋合而挾於脊直者從肩髃上頸此直者自肩髃行巨骨上頸中天鼎扶突之次其支者上頰結於鳩此支者自頸上頰下入齒中上結於手太陽顴髎之分直者上出手太陽之前上左角絡頭下右頷此直者自頸出手太陽天窗天容之前行耳前上額左角絡頭以下右頷此舉左而言右在其中亦如經脈之左之右右之左也故右行者亦上額右角交絡於頭下左頷以合於太陽少陽之筋手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈實則齲聾虛則齒寒痹隔取之所別也手陽明之絡名偏歷在腕後三寸上側間別走手太陰者也按本經筋脈皆無入耳上目之文惟此別絡有之宗脈者脈聚於耳目之間者也齲齒蠹病也此經上曲頰偏齒入耳絡肺下膈故實則為齒齲耳聾虛則為齒寒內痹而隔治此者當取所別之偏歷手陽明之本在肘骨中曲池穴上至別陽義未詳標在顏下顏額庭也合鉗上也謂脈由足陽明大迎之次夾耳之兩旁也胃經循行圖胃經循行經文胃足陽明之脈起於鼻之交頞中旁納太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下走跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端胃經穴圖左右共九十穴脈長八尺胃經腑象圖胃腑經文胃之上口名曰賁門飲食之精氣從此上輸於脾肺宣布於諸脈胃之下口即小腸上口名曰幽門脾胃者倉廩之官五味出焉胃者水穀氣血之海也胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿是經多氣多血難經曰胃重二斤一兩胃經循行主病總歌足陽明胃鼻頞起頞鼻莖也亦曰山根足之三陽從頭走足互交旁納足太陽納入也足太陽起睛明穴與頞相近陽明由頞中互交而下行故入之也下循鼻外入上齒鼻外即承泣四白巨髎之分挾口環唇交承漿環繞也承漿任脈穴頤後下廉大迎頰車遊腮下為頷頷下為頤頰車在耳下大迎頷下穴名耳前髮際至額顱耳前下關也循髮際以上頭維至額顱會於督脈之神庭額顱髮際前也支循喉嚨入缺盆下膈屬胃絡脾州胃與脾為表裡此支自缺盆入內下膈當上脘中脘之分屬胃絡脾直者下乳挾臍中直者由缺盆直下而外行自乳中天樞外陵等穴下入氣街中氣街在毛際兩旁鼠鼷上一寸支起胃口腹裡通下至氣街中而合由幽門循腹裡過足少陰肓腧之外此即上文支者之脈由胃下行而與直者復合於氣街之中遂下髀關伏兔逢膝上穴名膝臏之中循脛外足跗中指內間終膝蓋曰臏䯒骨曰脛足面曰跗此三者犢鼻巨虛衝陽等穴之次也乃循內庭入中指內間而出厲兌足陽明經止此支者下廉三寸別下入中指外間列廉上廉也下廉三寸即豐隆穴是為陽明別絡故下入中指外間又有支者別跗上大指之間太陰接又其支者自跗上衝陽穴次別行入大指間斜出足厥陰行間之次循大指出其端而接乎足太陰經也此經多氣復多血振寒呻欠面顏黑土病而洒洒振寒者風之勝也善呻數欠胃之郁也黑水色也土病則水無所畏故黑色反見於面顏病至惡見火與人陽明厥逆則喘而惋惋則惡人也惡火者邪客陽明則甚也忌聞木聲心惕惕土惡木也閉戶塞牖欲獨處陰陽相薄而陰勝陽也甚則登高棄衣走陽盛則四支實故上高而歌熱盛於身故棄衣而走賁響腹脹脈循腹裡水火相激而雷鳴為骭厥骭足脛也脈自臏下脛骨外廉故為脛骭厥逆是主血所生病者狂瘧溫淫及汗出熱勝則狂風勝則瘧溫氣淫泆則汗出鼽衄口骭並唇胗音疹唇瘍脈挾口環唇頸腫喉痹腹水腫土不能制水故大腹水腫膺乳膝臏股伏兔骭外廉足跗上皆痛陽明脈從缺盆下乳內廉挾臍腹前陰由股下足以入中指或為痛與不用氣盛熱在身以前陽明行身之前有餘消穀善飢溺黃甚不足身以前皆寒胃中寒而腹脹滿此陽明虛實寒熱在經在臟之辨胃經穴歌四十五穴足陽明承泣四白巨髎臨地倉大迎登頰車下關頭維對人迎水突氣舍連缺盆氣戶庫房屋翳屯膺窗乳中下乳根不容承滿出梁門關門太乙滑肉起天樞外陵大巨里水道歸來達氣衝髀關伏兔走陰市梁邱犢鼻足三里上巨虛連條口底下巨虛下有豐隆解谿衝陽陷谷同內庭厲兌陽明穴大指次指之端絡取穴分寸承泣一名面髎一名鼷穴在目下七分上直瞳子陷中陽蹺任脈足陽明三脈之會四白在目下一寸直瞳子向鳩骨顴空正視取之巨髎夾鼻孔旁八分直瞳子陽蹺足陽明之會由此入上齒中復出循地倉地倉一名會維夾口吻旁四分外如近下微有動脈若久患風其脈亦有不動者手足陽明任脈陽蹺之會靈官賦云地倉能止口流涎灸七壯或二七壯病右治左病左治右艾炷宜小如粗釵腳若過大口反喎大迎一名髓孔在曲頷頷腮下也前一寸三分骨陷中動脈本經自大迎循頰車上耳前下關頭維其支者從大迎前下人迎寒熱病篇曰臂陽明有入鳩偏齒者名曰大迎則此為手足陽明之會灸三壯七壯炷如小麥主治中風牙關不開失音不語口眼歪斜頰腫牙痛失欠牙關脫臼頰車一名機關一名曲牙在耳下曲頰端近前陷中側臥開口取之下關在客主人下耳前動脈下廉合口有空開口則閉側臥閉口取之足陽明少陽之會頭維在額角入髮際夾本神旁一寸五分神庭旁四寸五分足少陽陽明之會人迎一名天五會在頸下夾結喉旁一寸五分大動脈應手仰而取之足陽明少陽之會甲乙經曰夾結喉以候五臟氣灸三壯主治咳逆上氣咽喉癰腫短氣喘息不得臥水突一名水門在頸大筋前直人迎下夾氣舍上內貼氣喉氣舍在頸大筋前直人迎下夾天突邊陷中貼骨尖上有缺缺盆一名天蓋在肩上橫骨陷者中為五臟六腑之道氣戶在巨骨下夾俞府兩旁各二寸去中行四寸陷中仰而取之庫房在氣戶下一寸六分去中行四寸陷中仰而取之屋翳在庫房下一寸六分去中行四寸陷中仰而取之膺窗在屋翳下一寸六分巨骨下四寸八分去中行四寸陷中仰而取之乳中當乳之中一傳胎衣不下以乳頭向下盡處俱灸之即下乳根在乳中下一寸六分去中行四寸陷中仰而取之灸三壯五壯主治胸下滿痛臂痛乳痛悽悽寒熱霍亂轉筋四厥華佗明堂云主膈氣不下食噎病不容在第四肋端幽門旁一寸五分去中行二寸對巨闕甲乙經曰去任脈二寸至兩肘端相去四寸按甲乙經曰腹自不容以下至氣衝二十四穴夾幽門旁各一寸五分諸書皆同及考幽門則止去中行五分是不容以下諸穴當去中行二寸而諸云三寸者非今悉改為二寸承滿在不容下一寸去中行二寸對上脘梁門在承滿下一寸去中行二寸對中脘主治積氣脹滿腸鳴切痛泄痢不食走氣俠臍急痛痎瘧振寒遺溺灸五壯關門在梁門下一寸去中行二寸對建里太乙在關門下一寸去中行二寸對下脘滑肉門在太乙下一寸天樞上一寸去中行二寸對水分灸五壯主治癲狂嘔逆吐血重舌舌強天樞一名長溪一名谷門夾臍旁二寸去肓俞一寸五分陷中大腸募也外陵在天樞下一寸去中行二寸對陰交灸五壯主治腹痛心下如懸下引臍痛大巨一名腋門在天樞下二寸去中行二寸對石門水道在大巨下三寸去中行二寸歸來一名溪穴在水道下二寸去中行二寸灸五壯主治奔豚丸疝陰丸上縮入腹引痛婦人血臟積冷氣衝一名氣街在歸來下鼠溪上一寸動脈應手宛宛中去中行二寸骨空論王氏注曰在毛際兩旁鼷上一寸動脈處也刺禁論王氏注曰氣街之中膽胃脈也膽之脈循脅裡出氣街繞毛際胃之脈夾臍入氣街中衝脈所起金鑑云歸來下行在腿班中有肉核名曰鼠溪直上一寸動脈應手旁開中行二寸氣街穴也髀關在膝上伏兔後交文中一云在膝上一尺二寸伏兔在膝上六寸起肉間正跪坐而取之一云在膝蓋上七寸左右各三指按捺上有肉起如兔狀因以此名陰市一名陰鼎在膝上三寸伏兔下陷中拜而取之一云在膝內輔骨後大筋下小筋上屈膝得之梁邱在膝上二寸兩筋間足陽明郄神農經云治膝痛屈伸不得可灸三壯七壯犢鼻在膝臏下胻骨上骨解大筋陷中形如牛鼻故名一曰在膝頭下近外窟解中灸三壯主治膝痛不仁難跪起腳氣若膝臏癰腫潰者不可治不潰者可療若犢鼻堅硬勿便攻之先用洗熨而後微刺之愈三里即下陵出本輸篇在膝眼下三寸胻骨外廉大筋內宛宛中坐而堅膝低跗取之極重按之則跗上動脈止矣足陽明所入為合千金云灸二百壯至五百壯一云小兒忌灸三里三十外方可灸不爾反生疾上巨虛一名巨虛上廉在三里下三寸兩筋骨陷中舉足取之海論曰衝脈者其輸下出於巨虛之上下廉巨虛上廉足陽明與大腸合上廉屬大腸下廉屬小腸出本輸篇及邪氣藏府病形篇條口在三里下五寸下廉上一寸舉足取之下巨虛一名巨虛下廉在上廉下三寸兩筋骨陷中蹲地舉足取之巨虛下廉足陽明與小腸合又為衝脈下輸豐隆在外踝上八寸下廉胻骨外廉陷中足陽明絡別走太陰灸三壯主治頭痛面腫喉痹不能言解谿在衝陽後一寸五分足腕緊鞋帶處陷中一曰在足大指次指之間直上跗上陷者宛宛中刺瘧論注曰在衝陽後三寸半氣穴論注曰二寸半甲乙經曰一寸半足陽明所行為經療痎瘧寒熱須兼刺厲兌三里解谿商丘出血衝陽一名會原即仲景所謂趺陽也在足跗上五寸高骨間動脈去陷谷二寸足陽明所過為原刺禁論曰刺跗上中大脈血出不止死即此穴也陷谷在足大指次指外間本節後陷中去內庭二寸足陽明所注為輸內庭在足大指次指外間陷中足陽明所溜為滎厲兌在足大指次指端去爪甲如韭葉按本輸篇曰厲兌者足大指內次指之端也經脈經筋等篇俱雲中指繆刺篇曰邪客於足陽明之絡刺足中指次指爪甲上各一痏據此諸篇之說可見中指次指之間皆陽明脈氣所發也足陽明所出為井刺一分留一呼灸一壯主治屍厥口噤氣絕狀如中惡心腹滿水腫熱病汗不出寒熱瘧不食麵腫喉痹齒齲惡風鼻不利多驚發狂好臥足寒膝臏腫痛正筋別本標足陽明之正上至髀入於腹裡屬胃散之脾上通於心上循咽出於口上額䪼還擊目系合於陽明也此脾胃二經表裡相為一合也足陽明上至髀關其內行者由氣街入腹裡屬於胃散於脾上通於心循咽出於口上額䪼入承泣之次系目系為目下綱以合於陽明本經也足陽明之筋起於中三指結於跗上斜外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊中三指即足之中指厲兌之旁也結於跗上衝陽之次乃從足面邪行出太陰少陽兩筋之間上輔骨結於膝之外廉直上髀樞行少陽之前循脅向後內屬於脊其直者上循骭結於膝其支者結於外輔骨合少陽其直者自跗循骭結於膝下外廉三里之次上臏中其支者自前跗上斜外上行結於外輔骨陽陵泉之分與少陽相合其直者上循伏兔上結於髀聚於陰器上腹而布此直者出膝臏直上循伏兔髀關之分結於髀中乃上行聚於陰器陰陽總宗筋之會會於氣街而陽明為之長乃自橫骨之分左右夾行循天樞關門等穴而上布於腹此上至頸皆剛筋也至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱自缺盆上人迎循頤頰上挾口吻與陽蹺會於地倉上合於顴髎下結於鼻旁復上睛明穴合於足太陽太陽細筋散於目上故為目上綱陽明細筋散於目下故為目下綱其支者從頰結於耳前其支者自頤頰間上結耳前會於足少陽之上關頷厭上至頭維而終也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑實則狂巔虛則足不收脛枯取之所別也胃為五臟六腑之海而喉嗌缺盆為諸經之孔道故合諸經之氣下行而絡喉嗌為病如此治之者當取所別之豐隆也胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也此言胃氣所出之大絡名曰虛里其脈從胃貫膈上絡於肺而出左乳之下其動應於衣是為十二經脈之宗故曰脈宗氣也宗主也本也蓋宗氣積於膻中化於水谷而出於胃也經脈篇所載十五絡並此共十六絡也足陽明之本在厲兌在足次指端標在人迎頰挾頏顙也人迎在結喉旁脾經循行圖脾經循行經文脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中脾經穴圖左右共四十二穴脈長六尺五寸脾經臟象圖脾臟經文脾者倉廩之官五味出焉形如刀鐮與胃同膜而附其上之左俞當十一椎下聞聲則動動則磨胃而主運化其合肉也其榮唇也開竅於口是經常多氣少血難經曰脾重二斤三兩廣扁三寸長五寸有散膏半斤主裹血溫五臟主藏意與智滑氏曰掩乎太倉華元化曰脾主消磨五穀養於四旁脾經循行主病總歌太陰脾起足大指脾起足大指端隱白穴足之三陰從足走腹循指內側白肉際過核骨後內踝前核骨大指本節後內側圓骨也滑氏言為孤拐骨非蓋孤拐即踝骨核骨惟一踝骨則有內外之分滑氏以足根為踝亦非上踹音煆經中與腨通用足肚也亦名腓腸循脛本經由脛後漏谷上行交出足厥陰之前即地機之分膝股里股大腿也一曰髀內為股股內前廉入腹中自衝門穴入腹內行屬脾絡胃當中脘下脘之分上膈通挾咽連舌散舌下自胃脘上行連舌本散舌下而終支者從胃注心宮足太陰外行者由腹之四行上府舍腹結等穴而散於胸中而止於大包其支者內行從胃脘別上膈注心中而接乎手少陰經也此經血少而氣旺是痛即病舌本強食則嘔出脾不能運則物盛滿而溢胃脘痛心中善噫而腹脹噫音隘噯嘆聲陰邪盛則上走陽明陽明之正上通於心故上走心為噫氣滯故也得後大便與氣失氣快然衰陽氣出則陰邪散故快然如衰脾病身重脾主肌肉木剋土也不能動搖瘕泄滯則為癥瘕寒則為溏泄水閉及黃疸土不制水則為泄為水閉為不能臥煩心心痛本經支脈上膈注心中食難消食不下強立股膝內多腫脾主四肢脈起於足拇以上膝股故為腫為厥為大指不用不能臥因胃不和脾經穴歌足太陰脾起足拇隱白先從內側起大都太白繼公孫商邱直上三陰塢漏谷地機陰陵泉血海箕門衝門前府舍腹結大橫上腹衰食竇天溪連胸鄉周榮大包盡二十一穴太陰全取穴分寸隱白在足大指內側端去爪甲角如韭葉足太陰所出為井刺一分留三呼灸三壯主治小兒客忤驚風大都在足大指本節後內側骨縫白肉際陷中足太陰所溜為滎太白在足大指後內側核骨下赤白肉際陷中足太陰所注為輸即原也公孫在足大指內側本節後一寸內踝前陷中正坐合足掌相對取之太陰絡別走陽明主治寒瘧不食癇氣好太息多寒熱汗出喜嘔卒面腫心煩多飲膽虛腹虛水腫腹脹如鼓脾冷胃痛刺四分留七呼灸三壯截法云能治心肝脾肺腎胃膽俱瘧及諸黃疸商邱在內踝下微前陷中前有中封後有照海此穴居中內踝下有橫文如偃口形足太陰所行為經灸三壯百證賦云專治痔漏最良三陰交在內踝上除踝三寸骨下陷中足三陰之交會刺此穴能落死胎妊娠不可刺灸五十壯主喉痹項頸滿腸痔氣逆痔血陰急鼻衄夢泄腳氣漏谷一名太陰絡在內踝上六寸骨下陷中地機一名脾舍在膝下五寸內側骨下陷中伸足取之一曰在別走上一寸孔在膝下五寸足太陰郄灸五壯主治腰痛不可俯仰溏泄腹脹水腫不嗜食精不足小便不利足痹痛女子癥瘕陰陵泉在膝下內輔骨下陷中伸足取之或曲膝取之與少陽經陽陵泉內外相對一曰稍高一寸足太陰所入為合天星秘訣云若是小腸連臍痛先刺陰陵後湧泉血海一名百蟲窠在膝臏上一寸內廉白肉際陷中一云在膝內輔骨上橫入五分箕門在魚腹上越兩筋間陰股內廉動脈應手一云股上起筋間甲乙經曰太陰內市衝門一名慈宮上去大橫五寸在府舍下橫骨兩端約文中動脈去腹中行三寸半足太陰厥陰之會府舍在腹結下三寸去腹中行三寸半足厥陰太陰陰維之會甲乙經曰此脈上下入腹絡胸結心肺從脅上至肩此太陰郄三陰陽明支別腹結一名腹屈在大橫下一寸三分去腹中行三寸半灸五壯主治咳逆繞臍腹痛中寒瀉痢心痛大橫在腹哀下三寸五分平臍去腹中行三寸半足太陰陰維之會腹哀在日月下一寸五分去腹中行三寸半足太陰陰維之會食竇在天溪下一寸六分陷中舉臂取之天溪在胸鄉下一寸六分陷中仰而取之胸鄉在周滎下一寸六分陷中仰而取之周滎在中府下一寸六分陷中仰而取之大包在淵腋下三寸脾之大絡布胸脅中出九肋間及季脅端總統陰陽諸絡由脾灌溉五臟刺三分灸三壯主治胸中喘痛腹有大氣不得息實則其身盡寒虛則百節皆縱正筋別本標足太陰之正上至髀合於陽明與別俱行上結於咽貫舌中足太陰之正上股內合於足陽明與別者俱行上咽貫舌足太陰之筋起於大指之端內側上結於內踝自隱自循核骨而上結於內踝下商邱穴其直者結於膝內輔骨陰陵泉上循陰股結於髀箕門聚於陰器自箕門乃上橫骨兩端與足厥陰會於衝門橫繞曲骨並足少陰陽明之筋而聚於陰器皆剛筋也上腹結於臍循腹裡結於肋散於胸中其內者著於脊其前行者自陰器上腹會手少陰之筋結於臍循腹裡由大橫腹哀之次結於肋乃散為柔細之筋上行布於胸中胸鄉大包之次其內行者由陰器宗筋之間並陽明少陰之筋而上著於脊足太陰之別曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也厥氣者脾氣失調而或寒或熱皆為厥氣逆而上行則為霍亂本經入腹屬脾絡胃故為如此之病治此者當取所別之公孫也脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也脾之大絡名大包在淵腋下三寸布胸脅出九肋間總統陰陽諸絡由脾灌溉五臟者也故其為病如此羅絡之血者言此大絡包羅諸絡之血故皆取脾之大絡以去之大絡即大包也足太陰之本在中封前上四寸之中中封足厥陰經穴前上四寸之中當是三陰交也標在背俞與舌本也背腧即脾俞也舌本舌根也心經循行圖心經循行經文心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端心經穴圖左右共十八穴脈長三尺五寸心經臟象圖四臟皆繫於心心臟經文心者君主之官神明出焉心居肺管之下膈膜之上附著於脊之第五椎是經常少血多氣其合脈也其榮色也開竅於耳又曰舌難經曰心重十二兩中有七孔三毛盛精汁三合主藏神心象尖圓形如蓮蕊其中有竅多寡不同以導引天真之氣下無透竅上通乎舌共有四系以通於四臟心外有赤黃裹脂是為心包絡心下有膈膜與脊脅周迴相著遮蔽濁氣使不得上熏心肺所謂膻中之虛谷也心經循行主病總歌手少陰脈起心經心當五椎之下其繫有五上系連肺肺下繫心心下三系連脾肝腎故心通五臟之氣而為之主也下膈直絡小腸承當臍上二寸下脘之分絡小腸也支者挾咽系目系支者從心系出任脈之外上行挾咽系目系以合於內眥直者從心系上肺騰下腋其正脈自前心系復上肺由足少陽淵腋之分出腋下行極泉本經之外行者始此循臑後廉青靈穴出太陰心主之後行手之三陰少陰居太陰厥陰之後下肘循臂內後廉抵掌後銳骨之端手腕下踝為銳骨即神門穴也小指停入掌內後廉循小指之內出其端手少陰經止此乃交小指外側而接乎大腸經也滑氏曰心為君主之官尊於他臟故其交經受授不假支別云此經少血而多氣是動咽乾心內疼本經支脈從心系上挾咽目黃脅痛系目出腋渴欲飲心火炎則心液津耗臑臂痛厥脈行臑臂內後廉掌熱蒸脈入掌內後廉心經穴歌手少陰心起極泉青靈少海靈道全通里陰郄神門下少府少衝小指邊取穴分寸極泉在臂內腋下筋間動脈入胸中青靈在肘上三寸伸肘舉臂取之滑氏曰自極泉下循臑內後廉行太陰心主兩經之後歷青靈穴甲乙經無此穴少海一名曲節在肘內廉節後陷中又云肘內大骨下去肘端五分肘內橫文頭屈肘向頭取之手少陰所入為合靈道在掌後一寸五分一曰一寸手少陰所行為經通里在腕側後一寸陷中手少陰絡別走手太陽經陰郄一曰手少陰郄在掌後脈中去腕五分當小指之後神門一名兌沖一名中都在掌後銳骨端陷中當小指後手少陰所注為輸少府在小指本節後骨縫陷中直勞宮手少陰所溜為滎此穴灸三壯主治痎瘧久不愈振寒煩滿少氣胸中痛悲恐畏人臂酸肘腋攣急陰挺出陰癢陰痛遺尿偏墜小便不利少衝一名經始在手小指內側端去爪甲角如韭葉手少陰所出為井乾坤生意云此為十井穴治同手太陰正筋別本標手少陰之正別入於淵腋兩筋之間屬於心上走喉嚨出於面合目內眥手少陰之正自腋下三寸足少陽淵腋之次行兩筋之間內屬於心與手太陽入腋走心者合乃上行挾於咽出於面合於目內眥是當與足太陽睛明相會矣手少陰之筋起於小指之內側結於銳骨神門上結肘內廉少海上入腋極泉交太陰挾乳里此經自指至腋入腋而交手太陰之筋斜絡挾乳內行以上皆剛筋也結於胸中循賁下繫於臍自乳里內行結於胸中與三陰之筋合蓋心主少陰之筋皆與太陰合於賁而下行也手少陰之別名曰通里去腕一寸半別而上行走手太陽循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也本經入心下膈故邪實則支膈謂膈間若有所支而不暢也其支者上系舌本故虛則不能言當取通里以治之也手少陰之本在銳骨之端神門穴也標在背輸也心輸也小腸經循行圖小腸經循行經文小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩腫交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴小腸經穴圖左右共三十八穴脈長五尺小腸經腑象圖小腸經文小腸者受盛之官化物出焉小腸後附於脊前附於臍上左回疊積十六曲大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半小腸上口在臍上二寸近脊水穀由此而入復下一寸而外附於臍為水分穴當小腸之下口至是而泌別清濁水液滲入膀胱滓穢流入大腸是經常多血少氣難經曰小腸重二斤十四兩小腸經循行主病總歌手太陽經小腸脈小指之端外側起少澤循手外側上腕出踝中銳骨上臂骨出肘內側兩筋之間本經循臂骨下廉陽谷等穴出肘內側兩骨尖中小海穴也此處捺之應於小指之上臑外後廉行手陽明少陽之外出肩解肩後骨縫曰肩解即肩貞穴而繞肩胛臑俞天宗等處滑氏曰脊兩傍為膂膂上兩角為肩解肩解下成片骨為肩胛即肩膊也交肩之上秉風曲垣等穴左右交於兩肩之上會於督脈之大椎入缺盆直絡心中自缺盆由胸中下行入膻中絡心循咽嗌下膈抵胃屬小腸自缺盆循咽下膈抵胃下行當臍上二寸之分屬小腸此經之內行者支從缺盆上頸頰至目銳眥入耳中其支行於外者出缺盆循頸中之天窗上頰後之天容由顴髎以入耳中之聽宮手太陽經止於此支者別頰頰車顴髎之次斜上䪼目下也抵鼻至於目內眥其絡與足太陽接交目內眥足太陽之睛明穴也嗌痛頸腫本經脈循咽下膈支者循頸上頰此寒淫所勝病及火府也頭難回不可以顧肩似拔兮臑似折脈循臑出肩耳聾目黃腫頰間脈入耳至目外眥上頰是所生病為主液小腸主泌別清濁病則水穀不分而流衍無制頸頷肩臑肘臂外後廉痛此經少氣而多血小腸經穴歌手太陽經小腸穴少澤先於小指設前骨後谿腕骨間陽谷須同養老列支正小海上肩貞臑俞天宗秉風合曲垣肩外復肩中天窗循次上天容此經穴數一十九還有顴髎入聽宮取穴分寸少澤一名小吉在手小指外側端去爪甲角一分陷中甲乙經曰在小指之端去爪甲一分陷中手太陽所出為井刺一分留二呼灸一壯主治痎瘧寒熱汗不出喉痹舌強心煩咳嗽瘛瘲臂痛頸項痛不可顧目生翳及療婦人無乳先瀉後補乾坤生意云此為十井穴治同手太陰前谷在手小指外側本節前陷中手太陽所溜為滎後谿在手小指本節後外側橫文尖上陷中仰手握拳取之一云在手腕前外側拳尖起骨下陷中手太陽所注為輸刺一分留二呼灸一壯三壯玉龍賦云專治時疫痎瘧一傳治早食午吐午食晚吐灸此左右二穴九壯立愈腕骨在手外側腕前起骨下陷中手太陽所過為原陽谷在手外側腕中銳骨下陷中手太陽所行為經灸三壯治小兒瘛瘲舌強養老在手外踝骨上一空腕後一寸陷中手太陽郄支正在腕後外廉五寸手太陽絡別走少陰小海在肘內大骨外去肘端五分陷中屈手向頭取之手太陽所入為合刺二分留七呼灸五壯七壯主治肘臂肩臑頸項痛寒熱齒根痛風眩瘍腫小腹痛五癇瘛瘲肩貞在肩曲胛下兩骨解間肩髃後陷中臑俞在肩髎後大骨下胛上廉陷中舉臂取之手足太陽陽維陽蹺之會天宗在秉風后大骨下陷中秉風在肩上天髎外小髃骨舉臂有空手太陽陽明手足少陽之會曲垣在肩中央曲胛陷中按之應手痛肩外俞在肩胛上廉去脊大椎旁三寸陷中與大杼平肩中俞在肩胛內廉去脊大椎旁二寸陷中天窗一名窗籠在頸大筋前曲頰下扶突後動脈應手陷中千金云狂邪鬼語灸九壯癮疹灸七壯天容在耳下曲頰下後灸三壯主治癭氣頸癰不可回顧不能言齒噤耳鳴耳聾喉痹咽中如梗寒熱胸滿嘔逆吐沫顴髎一名兌骨在面頄骨下廉銳骨端陷中手少陽太陽之會刺二分禁灸主治口喎面赤目黃眼瞤不止䪼腫齒痛聽宮一名多所聞在耳中珠子大如赤小豆手足少陽手太陽之會正筋別本標手太陽之正指地別於肩解入腋走心系小腸也此小腸與心為表裡經脈相為一合也指地者地屬陰居天之內手太陽內行之脈別於肩解入腋走心繫於小腸皆自上而下自外而內故曰指地經脈篇言交肩上入缺盆絡心此言別於肩解入腋走心蓋前後皆有入心之脈也手太陽之筋起於小指之上結於腕上循臂內廉結於肘內銳骨之後彈之應小指之上入結於腋下手小指之上外側少澤穴也上行結於手腕外側腕骨陽谷之次上循臂內側結於肘下銳骨之後小海之次但於肘尖上兩骨罅中以指捺其筋則痠麻應於小指之上是其驗也又由肘上臑外廉入結於後腋之下此皆剛筋也其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者自腋下與足太陽之筋合走腋後廉上繞肩胛行肩外俞肩中俞循頸中天窗之分出走太陽經筋自缺盆出者之前同上結於耳後完骨之次也其支者入耳中直者出耳上下結於頷上屬目外眥此支者自頸上曲牙入耳中聽宮之分其直者上行出耳上會於手少陽角孫之次其前而下者循頤結於頷與手陽明之筋會合其前而上者屬目外眥瞳子髎之次與手足少陽之筋合也手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所別也支正在腕後五寸走臂內則注手少陰者也此經走肘絡肩故邪實則脈絡壅滯而節弛肘廢正虛則血氣不行大則為疣即贅瘤也小則為指間痂疥之類治此者當取所別之支正也手太陽之本在外踝之後當是養老穴也標在命門之上一寸也當是睛明穴上一寸蓋睛明為手足太陽之會
