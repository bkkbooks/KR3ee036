body:
  text: 卷三膀胱經循行圖膀胱經循行經文膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側膀胱經穴圖左右共一百二十六穴脈長八尺膀胱經腑象圖膀胱經文膀胱者州都之官津液藏焉氣化則能出矣膀胱當十九椎居腎之下大腸之前有下口無上口當臍上一寸水分穴處為小腸下口乃膀胱上際水液由此別回腸隨氣泌滲而入其出其入皆由氣化入氣不化則水歸大腸而為泄瀉出氣不化則閉塞下竅而為癃腫後世諸書有言其有上口無下口有言上下諸有口者皆非是經常多血少氣難經曰膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半膀胱經循行主病總歌足太陽經膀胱脈目內眥睛明上額交巔由攢竹而上至絡卻穴左右斜行而交於巔頂之百會支者從巔入耳上角其支者由百會旁行至耳上角過足少陽之曲鬢率骨天衝浮白竅陰完骨故此六穴者皆為足太陽少陽之會直者從百會巔入絡腦間自百會行通天絡卻玉枕入絡於腦中也還出別下項循肩膊自腦復出別下項由天柱而下會於督脈之陶道絡卻循肩膊內分作四行而下挾脊抵腰此言內兩行者去脊一寸五分行十二俞等穴而抵腰中也循膂旋脊兩旁之內為膂絡腎正屬膀胱腑自腰中入膂絡腎前屬膀胱一支貫臀入膕傳從腰中循髖骨下夾脊歷四髎穴貫臀之會陽下行承扶委陽等穴入之委中也尻旁大肉曰臀膝後曲處曰膕一支從膊內左右別貫胛此言肩膊內大杼下外兩行也左右貫胛去脊各三寸別行歷附分魄戶等穴而下行也挾脊內過髀樞循髀外從後廉下合膕行由秩邊過髀樞會於足少陽環跳穴循髀外後廉去承扶一寸五分之間下行復與前之入膕中者相合貫腨內出外踝循京骨小趾本節後大骨曰京骨小趾外側至陰全足太陽經止此乃交於小趾之下而接乎足少陰經此經少氣而多血頭痛脊痛腰如折目似脫兮項似拔膕如結兮腨如裂髀不可曲以上皆足太陽經脈所歷之處而見諸證皆濕淫所勝土邪傷水也及為踝厥脈出外踝之後筋亦結於外踝也是所生病在筋結周身筋脈惟足太陽為多為巨其下者結於腫腨膕臀等處其上者挾腰脊絡肩項上頭為目上綱下結於頄故凡為攣為弛為反張戴眼之類皆足太陽之水虧而主筋所生病痔脈入肛瘧經為表狂癲邪入於陽疾並生鼽衄太陽經氣不能循經下行上衝於腦而為是病也目黃而淚出頭囟項背腰尻膕腨病若動時皆痛徹以上皆經脈所過膀胱經穴歌足太陽經六十三睛明攢竹曲差參五處承光接通天絡卻玉枕天柱邊大杼風門引肺俞厥陰心膈肝膽居脾胃三焦腎俞次大腸小腸膀胱如中膂白環皆二行去脊中間二寸許上髎次髎中復下會陽須向尻旁取還有附分在三行二椎三寸半相當魄戶膏肓與神堂譩嘻膈關魂門旁陽綱意舍及胃倉肓門志室連胞肓秩邊承扶殷門穴浮郤相鄰是委陽委中再下合陽去承筋承山相次長飛陽跗陽達崑崙僕參申脈過金門京骨曲骨近通谷小指外側尋至陰取穴分寸睛明一名淚孔在目內眥外一分宛宛中氣府論注曰手足太陽足陽明陰陽蹺五脈之會攢竹一名始光一名員柱一名夜光一名光明在眉頭陷者中明堂用細三稜針刺之宣泄熱氣眼目大明宜刺三分出血曲差一名鼻沖在神庭旁一寸五分入髮際正頭取之五處在曲差後五分夾上星旁一寸五分承光在五處後一寸五分水熱穴論注曰五處後一寸甲乙經五處後二寸此穴刺三分禁灸通天一名天曰在承光後一寸五分一曰橫直百會旁一寸五分刺三分留七呼灸二壯千金云癭氣面腫灸五十壯百證賦云能去鼻內無聞之苦絡卻一名強陽一名腦蓋在通天後一寸五分甲乙經一寸三分玉枕在絡卻後一寸五分甲乙經曰在絡卻後七分夾腦戶旁一寸三分起肉枕骨上入後髮際三寸按甲乙經之數與督脈之數不合天柱俠項後大筋外廉髮際陷中大杼在項後第一椎下兩旁相去脊中各二寸陷中正坐取之海論曰衝脈者其輸上在於大杼氣穴論注曰督脈別絡手足太陽三脈之會風門一名熱府在二椎下兩旁各去脊中二寸正坐取之督脈足太陽之會熱府腧也刺五分留七呼灸五壯主治傷寒頭痛項強目瞑鼽嚏胸中熱嘔逆氣喘臥不安身熱黃疸癰疽發背此穴能瀉一身熱氣常灸之永無癰疽瘡疥等患肺俞在三椎下去脊中各二寸又以手搭背左取右右取左當中指末處是穴正坐取之千金曰肺俞對乳引繩度之素問曰刺中肺三日死千金云治吐血唾血上氣咳逆喉痹灸隨年壯主治內言治腰脊強痛背僂如龜寒熱癭氣黃疸厥陰俞在四椎下去脊中二寸正坐取之此穴出山眺經甲乙經無心俞在五椎下去脊中二寸正坐取之素問曰刺中心一日死神農經云小兒氣不足者數歲不能語可灸五壯艾炷如麥粒膈俞在七椎下去脊中二寸正坐取之為血之會此血會也諸血病者皆宜灸之肝俞在九椎下去脊中二寸正坐取之素問曰刺中肝五日死膽俞在十椎下去脊中二寸正坐取之素問曰刺中膽一日半死脾俞在十一椎下去脊中各二寸正坐取之素問曰刺中脾十日死胃俞在十二椎下去脊中二寸正坐取之三焦俞在十三椎下去脊中二寸正坐取之千金云少腹堅大如盤盂胸腹脹滿飲食不消婦人症聚瘦瘠灸三焦俞百壯三報之治屎血灸百壯腎俞在十四椎下與臍平去脊中二寸正坐取之素問曰刺中腎六日死素問血氣形志篇有五臟俞度黃帝問於岐伯曰願聞五臟出於背者五臟居中其脈氣俱出於背之足太陽經是為五臟之俞岐伯曰背中大俞在杼骨之端大俞即大杼穴肺俞在三焦之間心俞在五焦之間膈俞在七焦之間肝俞在九焦之間脾俞在十一焦之間腎俞在十四焦之間皆挾脊相去三寸所焦即椎之義指脊骨之節間也自大杼至腎俞左右各去脊中一寸五分故云挾脊相去三寸所也則欲得而驗之按其處應在中而痛解乃其俞也驗取穴之法但按其俞穴之處必痛而且解即其所也解痠軟解散之謂欲知背俞先度其兩乳間中折之更以他草度去半已即以兩隅相拄也拄音主支也撑也乃舉以度其背令其一隅居上齊脊大椎兩隅在下當其下隅者肺之俞也此亦取五臟俞之法先以草橫量兩乳之間中半摺折之又另以一草比前草而去其半取齊中折之數乃豎立長草橫置短草於下兩頭相拄象三隅乃舉此草以量其背令一隅居上齊脊中之大椎其在下兩隅當三椎之前即肺俞穴復下一度謂以上隅齊三椎即肺俞中央其下兩隅即五椎之間心之俞也復下一度左角肝之俞也右角脾之俞也復下一度腎之俞也是謂五藏之俞灸刺之度也按肝脾腎俞取法與諸書不合當以背俞篇及甲乙經等書為是大腸俞在十六椎下去脊中二寸伏而取之刺三分留七呼灸三壯主治脊強不得俯仰腰痛腹脹繞臍切痛腸癖瀉痢食不化大小便不利小腸俞在十八椎下去脊中二寸伏而取之千金云消渴口乾不可忍者灸百壯橫三間寸灸之膀胱俞在十九椎下去脊中二寸伏而取之中膂內俞一名脊內俞在二十椎下去脊中二寸夾脊胛起肉間伏而取之白環俞在二十一椎下去脊中二寸伏而取之上髎在腰髁骨下一寸夾脊兩旁第一空陷中繆刺論注曰腰下夾尻有空骨各四蓋即此四穴也刺腰痛論注曰上髎當髁骨下陷中餘三髎少斜下按之陷中是也腰髁者即十六椎下腰脊兩旁起骨之夾脊者足太陽少陽之絡次髎夾脊旁第二空陷中中髎夾脊旁三空陷中下髎夾脊旁四空陷中刺腰痛篇及繆刺論王注皆曰足厥陰支別者與太陰少陽結於腰踝下夾脊第三第四骨空中其穴即中髎下髎也會陽一名利機在陰尾尻骨兩旁甲乙經曰督脈氣所發刺二分灸五壯一曰刺八分主治腹中寒氣泄瀉腸癖便血久痔陽氣虛乏陰汗濕附分在二椎下附項內廉兩旁相去脊中各三寸半正坐取之手足太陽之會魄戶在三椎下去脊中各三寸半正坐取之神農經云治虛勞發熱可灸十四壯膏肓俞在四椎下五椎上去脊中各三寸半正坐曲脊取之千金翼云先令病人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂動乃從胛骨上角摸索至胛骨下頭其間當有四肋三間依胛骨之際相去骨際如容側指許按其中一間空處自覺牽引肩中是其穴也左右各灸至百壯或三五百多至千壯當氣下嚨嚨然如流水之降若停痰宿疾亦必下也若病人已困不能正坐當令側臥挽上臂令前索孔穴灸之又法但以右手搭左肩上中指稍所不及處是其穴也左手亦然乃以前法灸之其有不能久坐伸臂者亦可伏衣襆上伸兩臂令人挽兩胛骨使相離遠不爾胛骨覆穴不得其真也所伏衣襆當令大小得宜不爾則前郤亦失其穴也此穴灸後令人陽氣日盛當消息自為補養令得平復則諸病無所不治又法如其人骨節分明則以椎數為準若脊背肥厚骨節難尋須以大椎至尾骶量分三尺折取之不然則以平臍十四椎命門為則逐椎分寸取之則穴無不真然取大椎之法除項骨三節不在內或人亦有項骨短而無可尋者但當以平肩之處為第一椎以次求之可無差也捷經云灸膏肓功效諸書例能言之而取穴則未也千金等方之外莊綽論之最詳然繁而無統不能歸定於一余嘗以意取之令病人兩手交在兩膊上灸時亦然胛骨遂開其穴立見以手指摸索第四椎下兩旁各三寸四肋三間之中按之痠疼是穴灸至千壯少亦七七壯當以千金立點立灸坐點坐灸臥點臥灸為的劉瑾云取膏肓二穴當除第一椎小骨不算若連第一椎數下當在五椎下兩旁各三寸半共折七寸分兩旁按其痠疼處乃是真穴每依此灸療多獲全愈灸七七壯至百壯千壯一云灸後當灸足三里以引火實下此穴自晉以前所未有乃後人之所增也此穴主治百病無所不療虛羸瘦損五勞七傷諸病夢遺失精上氣咳逆痰火發狂健忘胎前産後可灸二七至七七壯神堂在五椎下去脊中各三寸半陷中正坐取之譩嘻在肩膊內廉六椎下去脊中各三寸半正坐取之甲乙經曰以手痛按之病者呼譩嘻是穴蓋因其痛也千金云多汗瘧病灸五十壯膈關在七椎下去脊中各三寸半陷中正坐開肩取之此亦血會刺五分灸五壯治諸血病魂門在九椎下相去脊中各三寸半陷中正坐取之陽綱在十椎下去脊中三寸半陷中正坐取之意舍在十一椎下去脊中三寸半陷中正坐取之胃倉在十二椎下去脊中各三寸半正坐取之肓門在十三椎下去脊中各三寸半又肋間陷中前與鳩尾相直正坐取之志室在十四椎下去脊中各三寸半陷中正坐取之胞肓在十九椎下去脊中各三寸半陷中伏而取之秩邊在二十一椎下去脊中各三寸半陷中伏而取之刺五分灸三壯主治腰痛五痔小便赤澀承扶一名肉郤一名陰關一名皮部在尻臀下股陰上約文中殷門在承扶下六寸膕上兩筋之間浮郤在委陽上一寸屈膝得之委陽在承扶下六寸屈伸取之邪氣臟腑病形篇曰三焦合入於委陽甲乙經曰委陽三焦下輔腧也在足太陽之前少陽之後出於膕中外廉兩筋間此足太陽別絡也本輸篇曰三焦下腧出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則瀉之刺七分留五呼灸三壯委中一名血郤在膕中央約文動脈陷中伏臥屈足取之足太陽所入為合刺五分留七呼灸三壯一云禁灸春月勿令出血蓋太陽合腎主於冬水衰於春故春毋令出血合陽在膝膕約文下二寸承筋一名腨腸一名直腸在腨腸中央陷中腳跟上七寸灸三壯禁刺承山一名肉柱一名魚腹在兌腨腸下分肉間陷中一雲腿肚下尖分肉間靈光賦云治轉筋並久痔今時多用此穴治傷寒立效亦有初發瘧疾者灸之立已飛陽一名厥陽在足外踝上七寸後陷中足太陽絡別走少陰跗陽在足外踝上三寸太陽前少陽後筋骨之間陽蹺之郤崑崙在足外踝後五分跟骨上陷中細動脈應手足太陽所行為經刺三分留七呼灸三壯馬丹陽天星十二穴云治轉筋腰尻痛膊重更連陰頭疼脊背急暴喘滿衝心舉步行不得動足即呻吟若欲求安樂須尋此穴針神農經云小兒陰腫可灸三壯炷如小麥僕參一名安邪在跟骨下陷中拱足得之足太陽陽蹺之會申脈在足外踝下五分陷中容爪甲許白肉際陽蹺脈所生刺三分留七呼灸三壯靈光賦云陽蹺陰蹺及陽陵陰陵四穴治腳氣又兼足三里同治腳氣亦去在腰諸疾金門一名關梁在足外踝下一寸足太陽郤陽維別屬也京骨在足小指外側本節後大骨下赤白肉際陷中可按而得足太陽所過為原束骨在足小指外側本節後陷中赤白肉際足太陽所注為輸通谷在足小指外側本節前陷中足太陽所溜為滎至陰在足小指外側去爪甲角如韭葉足太陽所出為井張仲文治婦人橫産手先出諸符藥不效為灸右腳小指尖三壯炷如小麥下火立産正筋別本標足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也此膀胱與腎為表裡故其經脈相為一合也足太陽之正入膕中與少陰合而上行其別一道下尻五寸當承扶之次上入肛門內行腹中屬於膀胱散於腎循膂當心入散上出於項而復屬於本經太陽此內外同為一經也足太陽之筋起於足小指上結於踝邪上結於膝足太陽之筋起於足小指爪甲之側即足太陽經脈所止之處至陰穴次也循足跗外側上結於外踝崑崙之分乃邪上跗陽而結於膝膕之分結聚也其下循足外踝結於踵上循跟結於膕其下足跗之下也踵即足跟之突出者跟即踵上之鞭筋處也乃僕參申脈之分結於膕委中也膕音國鞭硬同其別者結於腨外上膕中內廉與膕中並此即大筋之旁出者別而為柔軟短筋亦猶木之有枝也後凡言別者支者皆仿此此支自外踝別行由足腨肚之下尖處行少陽之後結於腨之外側絡穴飛陽之分乃上膕內廉合大筋於委中而一之也上結於臀尾骶骨旁會陽之分也臀音屯上挾脊上項夾脊背分左右上項會於督脈之陶道大椎此皆附脊之剛筋也其支者別入結於舌本其支者自項別入內行與手少陽之筋結於舌本散於舌下自此以上皆柔軟之筋而散於頭面其直者結枕骨上頭下顏結於鼻其直者自項而上與足少陰之筋合於腦後枕骨間由是而上過於頭前下於顏以結於鼻下之兩旁也額上曰顏其支者為目上綱下結於頄綱綱維也所以約束目睫司開闔者也目下曰頄即顴也此支自通頂於腦者下屬目本散於目上為目上綱下行者結於頄與足少陽之筋合頄音求其支者從腋後外廉結於肩髃又其支者從挾脊循腋後外廉行足少陽之後上至肩會手陽明之筋結於肩髃其支者入腋下上出缺盆上結於完骨此支後行者從腋後腋下向前邪出陽明之缺盆乃從耳後直上會於手太陽足少陰之筋結於完骨完骨耳後高骨也其支者出缺盆邪上出於頄此支前行者同前缺盆之筋岐出別上頤頷邪行出於頄與前之下結於頄者相合也足太陽之別名曰飛陽去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足太陽之絡名飛陽在足外踝上七寸別走足少陰者也此經起於目內眥絡腦行頭背故其病如此治此者當取所別之飛陽足太陽之本在跟以上五寸中跗陽穴也標在兩絡命門命門者目也即睛明穴腎經循行圖腎經循行經文腎足少陰之脈起於小指之下邪走足心出於然谷之下循內踝之後別入跟中以上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中腎經穴圖左右共五十四穴脈長六尺五寸腎經臟象圖腎臟經文腎者作強之官伎巧出焉腎附於脊之十四椎下是經常少血多氣其合骨也其榮發也開竅於二陰難經曰腎有兩枚重一斤二兩主藏精與志華元化曰腎者精神之舍性命之根也腎有兩枚形如豇豆相併而曲附於脊之兩傍相去各一寸五分外有黃脂包裹各有帶二條上條繫於心下條趨脊下大骨在脊骨之端如半手許中有兩穴是腎帶經過之處上行脊間至腦中連於髓海腎經循行主病總歌足腎經脈屬少陰斜從小指趨足心足太陽之脈終於足小指而足少陰脈於小指下接之斜走足心湧泉穴出於然骨在內踝前大骨下循內踝之後別入跟中上腨內出膕內廉尋自復溜交信過足太明之三陰交以上腨內之築賓出膕內廉之陰谷上股內後廉直貫脊結於督脈之長強貫脊中而後屬腎屬腎下絡膀胱深前當關元中極之分而絡於膀胱滑氏曰由陰谷上股內後廉貫脊會於長強還出於前循橫骨而上至肓俞之次臍之左右屬腎下臍至關元中極之分而絡膀胱也直者從腎肓俞之分貫肝膈入肺中挾舌本循喉嚨自肓俞上行循商曲等穴至俞府而上循喉嚨並人迎挾舌本而終按足少陰經考之本篇及經別經筋等篇皆言由脊裡上注心肺而散於胸中惟骨空論曰衝脈起於氣街並少陰之經俠臍上行至胸中而散故甲乙經曰於俞府下至步廊等六穴皆云足少陰脈氣所發幽門至橫骨等十一穴皆云衝脈足少陰之會故滑氏注如此實本甲乙銅人諸書而甲乙又本於骨空論也支者從肺絡心上注胸膻中交於手厥陰其支者自神藏之際從肺絡心注胸中以上俞府諸穴少陰經止此而接乎手厥陰經也此經多氣而少血是動病飢不欲食腎雖陰臟元陽所居水中有火為脾胃之關陰動則陽衰而脾困真火不能溫養化源也面如漆柴水色黑陰邪見也腎藏脾精衰則枯如柴而無發生也咳唾有血喝喝而喘真陰損則虛火上奔子病及母也坐而欲起輒陰處不能靜也兩目䀮䀮如無所見目瞳子者骨之精也腎精內奪則䀮䀮如無所見故凡目多昏黑者必真水虧也心如懸心腎不交則精離散若飢陰虛則內餒故常若飢狀土邪淫勝病本於腎也皆精失善恐心惕惕如人將捕之腎在志為恐腎氣怯故為病如此咽腫舌乾兼口熱上氣腎水上溢為腫心痛或心煩本經之脈循喉嚨俠舌本其支者從肺出絡心故為病如此黃疸陰虛陽實為黃疸云腎水乘脾或為女勞疸腸澼陽邪自表入臟並聚於陰留薄下集則為腸澼及痿骨痿厥下不足則上逆脊股後廉之內痛皆經脈所過嗜臥多陰少陽精神匱也逆調論曰腎者水臟主津液主臥與喘也足下熱痛切脈起足心腎經穴歌足少陰穴二十七湧泉然谷太溪立大鐘水泉連照海復溜交信築賓實陰谷膝內輔骨後已上從足走至膝橫骨大赫聯氣穴四滿中注肓俞臍商曲石關陰都密通谷幽門寸半闢折量腹上分十一步廊神封膺靈墟神藏彧中俞府畢取穴分寸湧泉一名地衝在足心陷中屈足卷指宛宛中足少陰所出為井史記漢北齊王阿母患足下熱喘滿淳于意曰熱厥也刺足心立愈千金云鼻衄不止灸二百壯然谷一名龍淵一名然骨在足內踝前起大骨下陷者中別於足太陰之郤足少陰所溜為滎刺三分留三呼灸三壯一曰刺不宜見血治喘煩滿咳血喉痹消渴舌縱心恐氣少涎出小腹脹痿厥寒疝足跗腫胻酸寒熱不久立男子遺精婦陰挺月經不調難成孕初生小兒臍風動撮口洞泄此穴瀉百證賦云此穴易醒臍風太溪一名呂細在足內踝後五分跟骨上動脈陷中男子婦人病有此脈則生無此脈則死足少陰所注為輸即原也神農經云治牙疼可灸七壯大鐘在足跟後沖中大骨上兩筋間水熱穴論注曰在足內踝後沖中足少陰絡別走太陽水泉在足內踝下太溪下一寸足少陰郤照海在足內踝下一寸陷中容爪甲一云在內踝下四分微前高骨陷中前後有筋上有踝骨下有軟骨其穴居中神農經云在內踝直下白肉際是穴陰蹺所生攔江賦云治噤口喉風用三稜針出血即安復溜一名昌陽一名伏白在足內踝後上除踝二寸陷者中前傍骨是復溜後傍筋是交信二穴止隔一筋足少陰所行為經刺三分留三呼灸五壯七壯靈光賦云治腫如神交信在足內踝上二寸少陰前太陰後筋骨間陰蹺之郤築賓在足內踝後上腨分中陰維之郤刺三分灸五壯主治小兒胎疝癲疾吐舌發狂罵詈腹痛嘔吐涎沫足腨痛陰谷在膝下內輔骨後大筋下小筋上按之應手屈膝乃得之足少陰所入為合橫骨一名下極在大赫下一寸肓俞下五寸宛曲如仰月中央去任脈之中行旁開五分陰上橫骨中按少腹下尖自橫骨上行不可概用腹中分寸當以太陰之衝門起自橫骨兩端以至陽明之氣衝少陰之橫骨至中行之曲骨穴通計折量始得其準凡上至腹中皆當以此類推衝脈足少陰之會大赫一名陰維一名陰關在氣穴下一寸去中行五分衝脈足少陰之會氣穴一名胞門一名子戶在四滿下一寸去中行五分衝脈足少陰之會四滿一名髓海在中注下一寸去中行五分衝脈足少陰之會中注在肓俞下一寸去中行五分衝脈足少陰之會肓俞在商曲下一寸當作二寸直臍旁去臍中五分衝脈足少陰之會商曲在石關下一寸去中行五分衝脈足少陰之會石關在陰都下一寸去中行五分衝脈足少陰之會陰都一名食宮在通谷下一寸夾中脘相去五分衝脈足少陰之會通谷在幽門下一寸陷中夾上脘相去五分衝脈足少陰之會幽門一名上門夾巨關兩旁各五分陷中衝脈足少陰之會步廊在神封下一寸六分陷中去中行二寸夾中庭仰而取之神封在靈墟下一寸六分去中行二寸仰而取之靈墟在神藏下一寸六分去中行二寸陷中仰而取之神藏在彧中下一寸六分陷中去中行二寸仰而取之彧中在俞府下一寸六分陷中去中行二寸仰而取之俞府在巨骨下夾璇璣旁二寸陷中仰而取之正筋別本標足少陰之正至膕中別走太陽而合上至腎當十四顀椎同出屬帶脈直者系舌本復出於項合於太陽此為一合成以諸陰之別皆為正也足少陰之正自膕中合於太陽內行上至腎當十四椎旁腎俞之次出屬帶脈其直者上系舌本復出於項合於太陽是為六合之一也然有表必有里有陽必有陰故諸陽之正必成於諸明之別此皆正脈相為離合非旁通交會之謂也余仿此足少陰之筋起於小指之下並足太陰之筋邪走內踝之下結於踵與太陽之筋合而上結於內輔之下足少陰之筋起小指下邪趨足心又邪趨內側上然骨並足太陰商邱之次走內踝之下結於跟踵之間與太陽之筋合由踵內側上行結於內輔骨下陰谷之次並太陰之筋而上循陰股結於陰器自內輔並太陰之筋上循陰股上橫骨與太陰厥陰陽明之筋合而結於陰器皆剛筋也循脊內挾膂上至項結於枕骨與足太陽之筋合自陰器內行由子宮上系腎間並衝脈循脊兩旁挾膂上至項與足太陽之筋合結於枕骨內屬髓海膂音旅足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也足少陰之絡名大鐘在足跟後骨上兩筋間別走足太陽者也按十二經脈言本經從肺出絡心此言上走心包下外貫腰脊故其為病如此足少陰之本在內踝下上三寸中踝上二寸復溜交信也踝下一寸照海也標在背俞與舌下兩脈也背俞腎俞也舌下兩脈廉泉也心包絡經循行圖心包絡經循行經文心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端心包絡經穴圖左右共十八穴脈長三尺五寸心包絡經臟象圖心包絡經文按心包一臟難經言其無形滑伯仁曰心包一名手心主以臟象校之在心下橫膜之上豎膜之下其與橫膜相黏而黃脂裹者心也脂漫之外有細筋膜如絲與心肺引連者乃心包絡也此説為是凡言無形者非又按靈蘭祕典論有十二官獨少心包一官而多膻中者臣使之官喜樂出焉今考心包臟居膈上經始胸中正值膻中之所位居相火代君主行事者實臣使也此一官者其即此經之謂歟心包絡經循行主病總歌手厥陰經心主標邪之中心皆在包絡代君火行事也以用而言則曰心主以經而言則曰心包絡心包下膈歷絡三焦包絡為心主之外衛三焦為臟腑之外衛故為表裡相絡三焦有上中下故必下膈而遍歷之也起自胸中膻中支者出脅循胃出脅下腋三寸天池穴經之外行者始此由此而上抵腋下之天泉循臑內迢太陰肺少陰心中間走手之三陰厥陰在中也入肘中曲澤穴下臂行兩筋之間超掌後兩筋橫紋陷中內關大陵等穴行掌心勞宮穴出中指其出端中衝穴而終支者別掌中從小指次指交自勞宮別行無名指端而接乎手少陽經也是經少氣原多血是動則病手心熱臂肘攣急腋下腫甚則支滿在胸脅心中憺憺時大動以上皆經脈所及面赤目黃心之華在面目者心之使寒淫所勝心火受病也笑不歇心在聲為笑是主脈所生病者心主脈掌中熱心煩心痛掣皆經脈所過心包絡經穴歌心包九穴天池近天泉曲澤郤門認間使內關逾大陵勞宮中衝中指盡取穴分寸天池一名天會在乳後一寸腋下三寸著脅直腋撅間氣府論注曰在乳後同身寸之三寸手厥明足少陰之會千金云治頸漏瘰癧灸百壯天泉一名天濕在曲腋下去肩臂二寸舉臂取之曲澤在肘內廉橫紋陷中筋內側動脈屈肘得之手厥陰所入為合郤門在掌後去腕五寸手厥陰郤刺三分灸五壯主治嘔血衄血心痛嘔噦驚恐神氣不足久痔間使在掌後三寸兩筋間陷中手厥陰所行為經小兒客忤久瘧可灸千金云乾嘔不止所食即吐不停灸三十壯若四肢脈絶不至者灸之便通此法能起死人又治卒死灸百息內關在掌後去腕二寸兩筋間與外關相對手厥陰絡別走手少陽神農經云治心疼腹脹腹內諸疾可灸七壯大陵在掌後骨下橫紋中兩筋間陷中手厥陰所注為輸即原也千金云吐血嘔逆灸五十壯又云凡卒患腰腫附骨癰疽節腫遊風熱毒此等疾但初覺有異即急灸之從手掌後第一橫紋後兩筋間灸五壯立愈患左灸右患右灸左當中者兩手俱灸勞宮一名五里一名掌中在掌中央動脈屈無名指取之手厥陰所溜為滎一傳癲狂灸此效中衝在手中指端去爪甲如韭菜陷中手厥明所出為井刺一分留三呼灸一壯神農經云治小兒夜啼多哭灸一壯炷如小麥乾坤生意云此為十井穴治同肺經正筋別本標手心主之正別下淵腋三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下手厥陰之正其別而入行者與少陰之脈同自腋下三寸足少陽淵腋之次入胸中屬於三焦乃出循喉嚨行耳後合手足少陽於完骨之下手心主之筋起於中指與太陰之筋並行結於肘內廉中指端中衝之次也循指入掌中至掌後大陵之次並手太陰之筋上結於肘內廉曲澤之次上臂陰結腋下下散前後挾脅上臂陰天泉之次由腋間並太陰之筋結於腋下當天池之次下行前後布散挾脅聯於手太陰足少陽之筋此經自掌至腹皆剛筋也其支者入腋散胸中結於臂此支者自天池之分入腋內散於胸中臂當作賁蓋此支並太陰之筋入散胸中故同結於賁也手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為頭強取之兩筋間也手厥陰之絡名內關在掌後去腕二寸兩筋間別走手少陽者也此經繫心包絡心系又去耳後合少陽完骨之下故邪實則心痛虛則頭強不利也皆取內關治之手心主之本在掌後兩筋之間二寸中內關也標在腋下下三寸也天池也三焦經循行圖三焦經循行經文三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥三焦經穴圖左右共四十六穴脈長尺三焦經腑象圖三焦經文三焦者決瀆之官水道出焉是經常少血多氣中藏經曰三焦者人之三元之氣也總領五臟六腑營衛經絡內外左右上下之氣三焦通則內外左右上下皆通其於周身灌體和內調外榮左養右導上宣下莫大如此三焦經循行主病總歌手少陽經三焦脈起於手小指次指端無名指兩指之間液門中渚循手表腕陽池也出臂外兩骨之間行外關歷支溝上行貫肘天井循臑外上肩交出足少陽之後寰循臑外行手太陽之前歷清冷淵消濼臑會上肩髎過足少陽之肩井自天髎而交出足少陽之後也入缺盆而布膻中散絡心包下膈從循屬三焦並足太陽下輔腧在委陽足太陽穴宮其內行者入缺盆復由足陽明之外下布膻中散絡心包而為表裡乃自上焦下膈循中焦下行並足太陽之正入絡膀胱以約下焦故委陽為三焦之下輔腧也支行於外者從膻中上出缺盆循天髎上項會於督脈之大椎循天牖系耳後之翳風穴直上上角孫在耳之上角由是過足少陽之懸釐頷厭下行耳頰至䪼目下也際支從耳後翳風入耳中存過手太陽之聽宮出走耳前由耳門過足少陽之客主人交兩頰循和髎上絲竹空至目鋭眥會於瞳子髎膽經論手少陽經止此而接乎足少陽經也是經少血還多氣耳聾渾渾淳淳聽不明也嗌腫及喉痹脈上項系耳後故為是病以少陽相火動也氣所生病三焦為水瀆之腑水病必由於氣也汗出多三焦出氣以溫肌肉充膚故汗出頰腫痛及目鋭眥耳後肩臑肘臂外小指次指不如意皆經脈所過邪犯之也三焦經穴歌手少陽三焦所從二十三穴起關衝向液門中渚陽池歷外關支溝會宗三陽絡入於四瀆注天井清冷淵中消濼臑會肩髎同天髎天牖經翳風瘛脈顱息角孫入耳門和髎絲竹空取穴分寸關衝在手名指外側端去爪甲角如韭葉手少陽所出為井刺一分留三呼灸三壯主治頭痛口乾喉痹霍亂胸中氣噎不食肘臂動不能舉目昏昏乾坤生意云此為十井穴治同肺經液門在手小指次指岐骨間陷者中握拳取之手少陽所溜為滎中渚在手名指本節後間陷中在液門上一寸把拳取之手少陽所注為輸陽池一名別陽在手表腕上陷者中自本節後骨直對腕中手少陽所過為原神農經云治手腕疼無力不能上舉至頭可灸七壯外關在腕後二寸兩筋間陷中與內關相對手少陽絡別走心主神農經云治肘臂不得屈伸五指盡疼不能握物可灸七壯捷經云通治諸證支溝一名飛虎在腕後三寸兩骨間陷中手少陽所行為經會宗在腕後三寸空中一云空中一寸手少陽郤金鑑云支溝會宗二穴相併平直空中相離一寸三陽絡一名通間在臂上大交脈支溝上一寸四瀆在肘前五寸外廉陷中天井在肘外大骨尖後肘上一寸兩筋間陷中屈肘得之甄權云在曲肘後一寸又手按膝頭取之手少陽所入為合刺三分留七呼灸三壯主治瀉一切瘰癧瘡腫癮疹清冷淵在肘上二寸伸肘舉臂取之消濼在肩下臂外間腋斜肘分下行一傳海南治牙疼灸此穴臑會一名臑髎在臂前廉去肩端三寸宛宛中手陽明少陽二絡之會肩髎在肩端臑上陷中斜舉臂取之天髎在肩缺盆中上毖骨陷者中一曰直肩井後一寸又云須缺盆陷處上有空起肉上是穴手足少陽陽維三脈之會天牖在頸大筋外缺盆上天容後天柱前完骨下發際中上夾耳後一寸翳風在耳後尖角陷中按之引耳中痛手足少陽之會瘛脈一名資脈在耳本後雞足青絡脈中刺一分灸三壯主治頭風耳鳴小兒驚癇瘛瘲嘔吐瀉痢無時驚恐目澀眵膏顱息在耳後間青絡脈中百證賦云痓病非顱息不愈甲乙經曰灸三壯禁刺出血多則殺人角孫在耳廓中間上髮際下開口有空手太陽手足少陽三脈之會甲乙經手太陽作手陽明寒熱病篇曰足太陽有入頄遍齒者名曰角孫則足太陽脈亦會於此刺三分灸三壯主治目生翳齒齦腫不能嚼唇吻燥頸項強一云堪治耳齒之病耳門在耳前起肉當耳缺處陷中刺三分留三呼灸三壯一云禁灸主治耳聾聤耳膿汁耳生瘡齒齲唇吻強百證賦云兼絲竹空能住牙疼於頃刻和髎在耳前兌發下橫動脈手足少陽手太陽三脈之會絲竹空一名目髎在眉後陷中甲乙經曰足少陽脈氣所發一雲手足少陽脈氣所發刺三分留三呼噤灸灸之不幸令人目小及盲主治頭痛目赤目眩視物䀮䀮拳毛倒睫風癇戴眼發狂吐涎沫偏正頭風痛宜出血百證賦云兼耳門治牙疼於頃刻正筋別本標手少陽之正指天別於巔入缺盆下走三焦散於胸中也此三焦心主表裡經脈相為一合也指天者天屬陽運於地之外手少陽之正上別於巔入缺盆下走三焦散於胸中包羅臟腑之外故曰指天手少陽之筋起於小指次指之端結於腕中循臂結於肘上繞臑外廉上肩走頸合於手太陽小指次指之端無名指關衝之次也上結於手腕之陽池循臂外關支溝之次出臂出兩骨間結於肘自肘上臑外廉由臑會行太陽之裡陽明之外上肩髎走頸中天牖之分與手太陽之筋合皆剛筋也其支者當曲頰入系舌本其支者自頸中當曲頰下入系舌本與足太陽之筋合其支者上曲牙循耳前屬目外眥上乘頷頷當作額經文是頷字結於角又支者自頰行曲牙會足陽明之筋循耳前上行與手太陽足太陽之筋屈曲交綰而會於耳上之角孫乃屬目外眥而復會於瞳子髎之次與三陽交會上出兩額之左右以結於額之上角也手少陽之別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也手少陽之絡名外關在腕後二寸兩筋間別走手厥陰心主者也此經繞臂故為肘攣及不收之病治此當取所別之外關手少陽之本在小指次指之間上二寸當是液門穴也標在耳後上角當是角孫穴也下外眥也當是絲竹空穴膽經循行圖左右共八十六穴脈長八尺膽經循行經文膽足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別鋭眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛膽經穴圖膽經腑象圖六節臟象論曰凡十二臟皆取決於膽也膽腑經文膽者中正之官決斷出焉難經曰膽在肝之短葉間重三兩三銖長三寸盛精汁三合是經常多氣少血華元化曰膽者中清之腑號曰將軍主藏而不瀉六節臟象論曰凡十二臟皆取決於膽也膽經循行主病總歌足少陽脈膽經傳起於兩目鋭眥邊瞳子髎穴上抵頭角下耳後自目鋭眥由聽會客主人上抵頭角循頷厭下懸顱懸釐從耳上髮際入曲鬢率谷歷手陽明之角孫外折下耳後行天衝完骨等穴又自完骨外折上行循本神前至陽白復內折上行循臨泣腦空等穴由風池而下行也循頸過手少陽之天牖行手少陽前下至肩上肩井卻交出手少陽後過督脈之大椎會於手太陽之秉風則前行陽明缺盆之外旋支者耳後顳顬之次過手少陽之翳風穴入耳中過手太陽之聽宮出走耳前復自聽會至目鋭眥逢支別鋭眥下大迎足太陽穴在頷前一寸三分動脈陷中合手少陽絲竹和髎之次而下抵䪼宮下加頰車下頸行合於缺盆胸中承其下於足陽明者合於下關乃自頰車下頸循本經之前與前之入缺盆者相合內行而下入胸中貫膈絡肝原屬膽自胸中手厥陰天池之分貫膈足厥陰期門之分絡肝本經日月之分屬膽而為表裡也脅裡出氣街毛際縈循脅裡由足厥陰之章門下行足陽明之氣街繞毛際合於足厥陰入髀厭中環跳穴脈來橫直者缺盆下腋循胸過季脅肝經章門下合髀厭中直下而行於外者從缺盆下腋循胸歷淵液輒筋日月過季脅循京門帶脈等穴下行由居髎入足太陽之四髎下行復與前之入髀厭者相合於環跳穴也下循髀陽髀之外側出膝外廉下於外輔骨膝下兩旁高骨之前由髀陽行太陽陽明之中歷中瀆陽關出膝外廉下外輔之前自陽陵泉以下陽交等穴也直下抵絶骨之端出外踝之前循足跗上入小指次指間外踝上骨際曰絶骨其端即陽輔穴下懸鐘循足面上之丘墟臨泣等穴入足小指次指之間抵竅陰穴而終也支別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛足厥陰經於此連足大指次指本節後骨縫為岐骨大指爪甲後二節間為三毛此經多氣而少血是動口苦膽病則液泄而上溢善太息木鬱不舒心脅疼痛轉側難本經之別貫心循脅裡甚則面微有塵體無膏澤本經之別散於面膽木病則鬱而不能生榮燥金勝之也足外反熱為陽厥本經行足之外木病從火故為陽厥骨所生病剛氣失膽味苦苦走骨故膽主骨所生病又骨為幹其質剛膽為中正之官其氣亦剛膽病則失其剛故病及於骨凡驚傷膽者骨必軟即其明證目之鋭眥及頭頷缺盆腋下腫痛慘馬刀瘰癧也俠癭夾頸瘤屬頸腋生汗出振寒瘧疾成少陽居三陽之中半表半裡故陽盛則汗出風勝則振寒為瘧胸脅肋髀膝至脛絶骨外踝諸節疼皆本經之脈所及膽經穴歌足少陽經瞳子髎四十三穴行迢迢聽會客主頷厭集懸顱懸釐曲鬢翹率谷天衝浮白次竅陰完骨本神至陽白臨泣開目窗正營承靈腦空是風池肩井淵腋長輒筋日月京門鄉帶脈五樞維道續居髎環跳下中瀆陽關陽陵復陽交外邱光明陽輔高懸鐘邱墟足臨泣地五俠溪竅陰畢取穴分寸瞳子髎一名太陽一名前關在目外去眥五分手太陽手足少陽三脈之會刺三分灸三壯主治頭痛目癢外眥赤痛翳膜青盲遠視䀮䀮淚出多眵聽會一名聽河一名後關在耳前陷中客主人下一寸動脈腕腕中去耳珠下開口有空側臥張口取之刺四分灸三壯主治耳聾耳鳴牙車脫臼齒痛中風瘛瘲喎斜客主人一名上關在耳前起骨上廉開口有空側臥張口取之手足少陽足陽明三脈之會本輸篇曰刺之則呿不能欠者即此穴頷厭在耳前曲角顳顬上廉即腦空之上手足少陽足陽明之會懸顱在耳前曲角顳顬之中寒熱病篇曰足陽明有挾鼻入於面者名曰懸顱是此為足少陽陽明之會故氣府論注為足陽明脈氣所發懸釐在耳前曲角上顳顬下廉手足少陽陽明四脈之會曲鬢在耳上入髮際曲隅陷中鼓頷有空足太陽少陽之會率谷在耳上入髮際一寸半陷中嚼牙取之足太陽少陽之會小兒急慢驚風灸三壯炷如小麥天衝在耳後入髮際二寸一曰在耳上如前三分足太陽少陽之會浮白在耳後入髮際一寸足太陽少陽之會竅陰一名枕骨在完骨上枕骨下搖動有空足少陽太陽之會完骨在耳後入髮際四分足太陽少陽之會本神在曲差旁一寸五分一曰直耳上入髮際四分足少陽陽維之會陽白在眉上一寸直瞳子甲乙經曰足少陽陽維之會氣府論王氏注曰足陽明陽維二脈之會臨泣在目上直入髮際五分陷中正睛取之足太陽少陽陽維三脈之會刺三分留七呼灸三壯一曰禁灸主治鼻塞目眩生翳眵䁾冷眼目諸疾驚癇反視卒暴中風不識人脅下痛瘧疾日西發目窗一名至榮在臨泣後一寸足少陽陽維之會一云在臨泣後半寸正營在目窗後一寸一云半寸足少陽陽維之會承靈在正營後一寸五分足少陽陽維之會腦空一名顳顬在承靈後一寸五分夾玉枕骨下陷中氣府論王氏注曰夾枕骨後枕骨上足少陽陽維之會昔魏公苦患頭風發即心亂目眩華他刺此立愈風池在耳後顳顬後腦空下發際陷中按之引耳一云耳後陷中後髮際大筋外廉足少陽陽維之會刺四分灸三壯七壯炷不用大千金云治癭氣灸百壯玉龍賦云兼絶骨可療傴僂肩井一名膊井在肩上陷解中缺盆上大骨前一寸半以三指按取之當中指下陷者中手足少陽足陽明陽維之會灸㿗疝隨年壯百證賦云治乳癰極效淵液一名泉腋在腋下三寸宛宛中舉臂取之禁灸刺三分輒筋在腋下三寸復前行一寸著脅針灸大成曰一名神光一名膽募其穴則曰腋下三寸復前一寸三肋端橫直蔽骨旁七寸五分平直兩乳側臥屈上足取之膽之募足太陽少陽之會日月一名神光在期門下五分氣府論注曰在第三肋端橫直心蔽骨旁各同身寸之二寸五分上直兩乳膽之募也足太陰少陽陽維之會京門一名氣俞一名氣府在監骨腰中季脅本夾脊一云在臍上五分旁九寸半季脅本夾脊側臥屈上足伸下足舉臂取之腎之募也帶脈在季脅下一寸八分陷中一云在臍旁八寸半肥人九寸瘦人八寸如帶繞身管束諸經足少陽帶脈之會五樞在帶脈下三寸一曰在水道旁一寸半陷中足少陽帶脈之會維道一名外樞在章門下五寸三分一曰在中極旁八寸五分足少陽帶脈之會居髎在章門下八寸三分監骨上陷中足少陽陽蹺之會環跳在髀樞中側臥伸下足屈上足取之足少陽太陽之會馬丹陽天星十二穴云能針偏廢軀折腰莫能顧冷風並濕痹身體似繩拘腿胯連腨痛屈轉重欷吁若人能針灸頃刻病消除中瀆在髀骨外膝上五寸分肉間陷中足少陽絡別走厥陰陽關在陽陵泉上三寸犢鼻外陷中陽陵泉在膝下一寸外廉陷中尖骨前筋骨間蹲坐取之足少陽所入為合為筋之會神農經云治足膝冷痹不仁屈伸不得半身不遂脅肋疼痛可灸十四壯至二十一壯陽交一名別陽一名足髎在足外踝上七寸斜屬三陽分肉間陽維之郤外邱在外踝上七寸甲乙經曰足少陽郤光明在外踝上五寸足少陽絡別走厥陰陽輔一名分肉在足外踝上除骨四寸輔骨前絶骨端如前三分刺腰痛論注曰如後二分去邱墟七寸筋肉分間氣穴論注曰陽維脈氣所發足少陽所行為經神農經云治膝胻痠疼偏風不隨可灸十四壯懸鐘一名絶骨在足外踝上三寸當骨尖前動脈中尋按取之針灸經曰尋摸尖骨者乃是絶骨兩分開為足三陽之大絡按之陽明脈絶乃取之為髓之會邱墟在足外踝下如前陷中去臨泣三寸足少陽所過為原臨泣在足小指次指本節後間陷中去俠溪一寸五分足少陽所注為輸地五會在足小指次指本節後陷中去俠溪一寸刺一分禁灸俠溪在足小指次指本節前岐骨間陷中足少陽所溜為滎竅陰在足小指次指端去爪甲如韭葉足少陽所出為井刺一分留三呼灸三壯主治脅痛咳逆不得息手足煩熱汗不出癰疽口乾頭痛喉痹舌強耳聾轉筋肘不能舉正筋別本標足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝貫心以上挾咽出頤頷中散於面系目系合少陽於外眥也此膽肝二經為表裡經脈相為一合也足少陽繞髀陽入毛際與足厥陰合其內行而別者乃自季脅入胸屬膽散之上肝由肝之上系貫心上挾咽自頤頷中出散於面上系目系復合少陽之本經於目外眥瞳子髎也足少陽之筋起於小指次指上結外踝上循脛外廉結於膝外廉小指次指即第四指竅陰之次也外踝邱墟之次脛外廉外邱陽交之次膝外廉陽陵泉陽關之次此皆剛筋也其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻膝下支自外輔骨上走於髀分為二岐前結於陽明之伏兔後結於督脈之尻至此剛柔相制所以聯臀膝而運樞機也其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆季脅下兩旁軟處曰䏚胸上兩旁高處曰膺此直者自外輔骨走髀由髀樞上行乘䏚循季脅上走腋當手太陰之下出腋前廉橫繫於胸乳之分上結於缺盆與手太陰之筋相合皆剛筋也䏚音秒五音篇曰少也直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄此直者自上走腋處直上出腋貫於缺盆與上之結於缺盆者相合乃行足太陽經筋之前循耳上額角交太陽之筋於巔上復從足陽明頭維之分走耳前下腮頷復上結於頄支者結於目眥為外維此支者從顴上斜趨結於目外眥而為目之外維凡人能左右盼視者正以此筋為之伸縮也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也足少陽之絡名光明在外踝上五寸別走足厥陰者也此經下絡足跗故為厥為痿躄治此者當取所別之光明也足少陽之本在竅陰之間在小指次指之端標在窗籠之前窗籠者耳也即手太陽聽宮穴肝經循行圖肝經循行經文肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺肝經穴圖左右共二十八穴脈長六尺五寸肝經臟象圖肝臟經文肝者將軍之官謀慮出焉肝居膈下上著脊之第九椎下是經常多血少氣其合筋也其榮爪也主藏魂開竅於目其繫上絡於心肺下亦無竅難經曰肝重二斤四兩左三葉右四葉凡七葉刺禁論曰肝生於左滑氏曰肝之為臟其治在左其臟在右脅右腎之前並里著脊之第九椎肝經循行主病總歌足厥陰肝脈所終起於大指毛際叢足大指爪甲橫紋後毛際大敦穴循足跗上廉上內踝內踝前一寸中封也出太陰後入膕中上踝八寸中都之分交出足太陰之後上膕內廉至膝關曲泉等穴循股陰入毛中繞陰器股陰內側也循股內之陰包五里陰廉上會足太陰之衝門府舍入陰毛中之急脈遂左右相交環繞陰器而會於任脈之曲骨上抵小腹挾胃通屬肝絡膽自陰上入小腹會於任脈之中極關元循章門至期門之所挾胃屬肝下足少陽日月之所絡膽上貫膈布於脅肋自期門上貫膈行足太陰食竇之外大包之裡散布脅肋上足少陽淵腋手太陰雲門之下足厥陰經穴止此循喉嚨之後上入頏顙咽顙連目系目內深處出額會督頂巔逢其內行而上者自脅肋間由足陽明人迎之外循喉嚨之後入頏顙行足陽明大迎地倉四白之外內連目系上出足少陽陽白之外臨泣之裡與督脈相會於頂之百會其支復從目系出下行頰裡交環唇此支從前目系之分下行任脈之外本經之裡環於口唇之內支者從肝別貫膈上注於肺乃交宮又其支者從前期門屬肝所行足太陰食竇之外本經之裡別貫膈上注於肺下行至中焦挾中脘之分復接於手太陰之肺經以盡十二經之一周終而復始也是經血多而氣少腰痛俯仰難為工本經支別者與脾膽之脈同結於腰踝下中髎下髎之間故為腰痛刺腰痛篇曰厥陰之脈令人腰痛腰中如張弓弩弦婦少腹腫即疝病也男㿉音頽疝本經氣逆則為睪腫卒疝嗌乾脈循喉嚨脫色面塵蒙皆經脈所及燥淫所勝病本於肝也一云木鬱為病故有脫色塵蒙胸滿嘔逆及飧泄本經上行者挾胃貫膈木剋土也狐疝遺尿肝虛或閉癃肝火也本經下行者過陰器抵小腹故為此諸病肝經穴歌足厥陰經一十四大敦行間太衝是中封蠡溝伴中都膝關曲泉陰包次五里陰廉上急脈章門才過期門至取穴分寸大敦在足大指端去爪甲如韭葉及三毛中一云內側為隱白外側為大敦足厥陰所出為井凡疝氣腹脹足踵者皆宜灸之以泄肝木而脾胃之土自安又治五淋灸三十壯又失尿不禁灸七壯小兒灸一壯行間在足大指間動脈應手陷中一云在足大指次指岐骨間上下有筋前後有小骨尖其穴正居陷中有動脈應手足厥陰所溜為滎失尿不禁灸七壯通玄賦云治膝腫腰疼千金云小兒重舌灸行間隨年壯又莖中痛灸五十壯太衝在足大指本節後二寸一云一寸五分內間陷者中動脈應手一云在足大指本節後行間上二寸內間有絡亙連至地五會二寸骨罅間動脈應手陷中足厥陰所注為輸即原也刺三分留十呼灸三壯神農經云治寒濕腳氣痛行步難可灸三壯馬丹陽天星十二穴云能治生死病能醫驚癇風咽喉並心脹兩足不能動七疝偏墜腫眼目似云矇亦能療腰痛針下有神功中封一名懸泉在足內踝前一寸筋里宛宛中一云在內踝前一寸斜行小脈上貼足腕上大筋陷中仰足取之足厥陰所行為經蠡溝一名交儀在足內踝上五寸足厥陰絡別走少陽中都一名中郤在足內踝上七寸當胻骨中與少陰相直足厥陰郤膝關在犢鼻下二寸旁陷者中刺四分灸五壯主治風痹膝內腫痛引臏不可屈伸及寒濕走注白虎厲節風痛不能舉動咽喉中痛曲泉在膝內輔骨下大筋上小筋下陷中屈膝橫文頭取之足厥陰所入為合陰包在膝上四寸股內廉兩筋間卷足取之看膝內側有槽者中足厥陰別走者五里在氣衝下三寸陰股中動脈應手千金翼曰在陰廉下二寸陰廉在羊矢下斜里三分直上去氣衝二寸動脈陷中羊矢在陰旁股內約文縫中皮肉間有核如羊矢急脈氣府論曰厥陰毛中急脈各一王氏注曰在陰毛中陰上兩旁相去同身寸之二寸半按之隱指堅然甚按則痛引上下其左者中寒則上引少腹下引陰丸善為痛為小腹急中寒此兩脈皆厥陰之大絡通行其中故曰厥陰急脈即睪之系也可灸而不可刺病疝小腹痛者即可灸之按此穴自甲乙經以下諸書皆無是遺誤也經脈篇曰足厥陰循股陰入毛中過陰器又曰其別者脛上睪結於莖然此實厥陰之正脈而會於陽明者也今增入之章門一名長平一名脅髎在大橫外直臍季肋端側臥屈上足伸下足舉臂取之一云肘尖盡處是穴一云在臍上一寸八分兩旁各八寸半季肋端一云在臍上二寸兩旁各六寸寸法以胸前兩乳間橫折八寸約取之脾之募也為臟之會足厥陰少陽之會難疏曰臟會季肋臟病治此千金云奔豚積聚堅滿脹痛吐逆不下食腰脊冷疼小便白濁灸脾募百壯三報之期門在不容旁一寸五分上直乳第二肋端肝之募也足厥陰太陰陰維之會刺四分灸五壯七壯千金云主奔豚灸百壯上氣咳逆胸滿痛徹胸背灸巨關期門各五十壯一婦人患傷寒熱入血室醫者不識許學士曰小柴胡已遲當刺期門豫不能針請善針者針之如言而愈正筋別本標足厥陰之正別跗上上至毛際合於少陽與別俱行此為二合也足厥陰之正別跗內行上至陰毛之際合於足少陽與別者俱行上布脅肋是為六合之二也足厥陰之筋起於大指之上上結於內踝之前大指上三毛際大敦次也行跗上足太陰之筋並行結於內踝前中封之次上循脛上結內輔之下上循陰股結於陰器絡諸筋由內踝上足脛循三陰交之分上行並足少陰之筋上結於內輔骨下曲泉之次復並太陰之筋上循陰股中五里陰廉之分上急脈而結於陰器陰器者合於太陰厥陰陽明少陰之筋以及衝任督之脈皆聚於此故曰宗筋厥陰屬肝主筋故絡諸筋而一之以成健運之用足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者循脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也足厥陰之絡名蠡溝在足內踝上五寸別走足少陽者也本經絡陰器上睪結於莖故其所病如此而治此者當取所別之蠡溝足厥陰之本在行間上五寸所中封穴標在背腧也即肝俞
