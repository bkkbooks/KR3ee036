front:
  text: 自序天地萬物之橐也育陽無計量者天之為天乎化生無法崖者地之為地乎然虛滿離合流化遍所其神固妙於莫窮其體實貞於不變故圓而無端者天也而推以九野之法凡日星之垂象者天之大體可知矣廣而無極者地也而循以兩界之説凡河嶽之成形者地之大體可識矣暨之天左舒而起牽牛地右闢而起畢昂東西南朔經緯燦然而天地之體畢彰惟天因人惟人象天人身一小天地也欲習岐黃者是又烏可不詳豫幼攻制舉潦倒名場迄無成就遂決然捨去肆力於醫夫醫之為道非徒鞭治百草也人受天地之中以生太和蘊釀實與同體天有四時五行人有四肢五臟和而為雨怒而為風凝而為霜雪張而為虹霓此天地之常數也呼吸吐納精氣貫通流而為營衛彰而為氣色發而為聲音此人之常數也五緯盈縮星辰錯行日月薄蝕孛彗飛流天地之危沴也寒暑不時天地之蒸否也石立土踴天地之贅瘤也山崩土陷天地之癰疽也奔風暴雨天地之喘乏也川瀆竭涸天地之枯焦也惟人亦然蒸則生熱否則生寒結而為贅瘤陷而為癰疽奔而為喘乏竭而為枯焦且形見於外而沴實發於內蓋至乖戾而有疾則必有其得疾之處苟昧其處而妄加調劑是猶以水投石抱薪救火無惑乎方之不靈而病之益憊也豫業此有年今老矣雖乏生枯起朽之術竊謂治病者必列別臟腑端絡經脈周身部節不爽毫釐乃能由外達內窮及根蒡得其受病之由而施其補救之術因留心古籍參考會通明發前哲辨其訛謬圖而正之書成曰經脈圖考庶權度規矩不迷所設而藝藝衆生即以同登仁壽也夫天地有疾聖人正之以至德輔之以人事人有疾良醫導之以藥石救之以針灸固欲培其元善之氣而葆其太和之體也昔管子之言曰人能正靜皮膚寬裕耳目聰明筋伸而骨堅始足戴大圓而履大方是則豫管窺蠡測之意也夫陳惠疇壽田氏撰
