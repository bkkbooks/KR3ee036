body:
  text: 卷一內景賦嘗計夫人生根本兮由乎元氣表裡陰陽兮升降沉浮出入運行兮周而復始神機氣立兮生化無休經絡兮行乎肌表臟腑兮通乎咽喉喉在前其形堅健咽在後其質和柔喉通呼吸之氣氣行五臟咽為飲食之道六腑源頭氣食兮何能不亂主宰者會厭分流從此兮下咽入膈臟腑兮陰陽不侔五臟者肺為華蓋而上連喉管肺之下心包所護而君主可求此即膻中宗氣所從膈膜周蔽清虛上宮脾居膈下中州胃同膜連胃左運化乃功肝葉障於脾後膽腑附於葉東兩腎又居脊下腰間有脈相通主閉蟄封藏之本為二陰天一之宗此屬喉之前竅精神須賴氣充又如六腑陽明胃先熟腐水穀胃脘通咽上口稱為賁門穀氣從而散宣輸脾經而達肺誠臟腑之大源歷幽門之下口聯小腸而盤旋再小腸之下際有闌門者在焉此泌別之關隘分清濁於後前大腸接其右導渣穢於大便膀胱無上竅由滲泄而通泉羨二陰之和暢皆氣化之自然再詳夫臟腑略備三焦未宣號孤獨之腑擅總司之權體三才而定位法六合而象天上焦如霧兮靄氤氳之天氣中焦如漚兮化營血之新鮮下焦如瀆兮主宣通乎壅滯此所以上焦主內而不出下焦主出而如川又總諸臟之所居隔高低之非類求脈氣之往來果何如而相濟以心主之為君朝諸經之維繫是故怒動於心肝從而熾欲念方萌腎經精沸構難釋之苦思枯脾中之生意肺脈澀而氣沉為悲憂於心內惟脈絡有以相通故氣得從心而至雖諸臟之歸心實上系之聯肺肺氣何生根從脾胃賴水穀於敖倉化精微而為氣氣旺則精盈精盈則氣盛此是化源根坎里藏真命雖內景之緣由尚根苗之當究既云兩腎之前又曰膀胱之後出大腸之上左居小腸之下右其中果何所藏蓄坎離之交姤為生氣之海為元陽之竇闢精血於子宮司人生之夭壽稱命門者是也號天根者非謬使能知地下有雷聲方悟得春光彌宇宙內景圖心系七節七節之傍中有小心以腎系十四椎下由下而上亦七節也舊圖有精道循脊背過肛門者甚屬非理而且無子宮命門之象皆大失也今改正之唇口喉舌腸胃尺寸數唇至齒長九分齒至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸難經曰重十二兩喉嚨難經曰重十二兩廣二寸長一尺二寸計九節腸胃自胃至腸總長五丈八尺四寸受水穀九斗二升一合合之大半自唇所入至肛門所出共長六丈四寸四分小大回腸共三十二曲上義俱出腸胃篇考正內景圖說壽田張介賓先生改正精道由命門而出於莖端其理甚屬明顯有補大造但於喉咽二門分為二歧不相依副未免有失夫唇口到喉咽處通為一道至呼氣吸食所始分二門喉門有會厭為之主宰故氣食不亂今改一大圈象通口一道又分二小門前為會厭門後為吸食門合於喉在前咽在後之旨豈不喉咽相為附著再胃之下口名幽門即小腸上口經云小腸後附於脊前附於臍上又云小腸上口在臍上二寸近脊既云近脊則幽門當在近脊之處小腸下際號曰闌門即大腸上口經云迴腸當臍廣腸附脊由此而觀則闌門必定近臍附於膀胱之上始與秘別清濁之意相合而舊圖幽門近臍闌門附脊位置有乖經旨不合茲遵經旨改正幽門附脊闌門近臍不知有當醫門之考覈否也仰人骨度部位圖伏人骨度部位圖周身骨部名目巔頂巔也腦頭中髓也囟音信腦蓋骨也嬰兒骨未合軟而跳動之處謂之囟門是也額顱顱前為髮際髮際前為額顱顏額上曰顏說文曰眉目之間也頞音遏鼻梁亦名下極即山根也䪼音拙目下為䪼顳顬顳柔涉切顬音儒耳前動處蓋即俗所云兩太陽也一曰鬢骨顑音坎又海敢切釋義曰飢而面黃與經義未合詳見經絡類部分頄音求顴頰間骨頰耳下曲處為頰頤音移頷中為頤頷何敢切腮下也虎頭燕頷義即此目系目內深處脈也目內眥目內角也目銳眥目外角也人中唇之上鼻之下也齒牙前小者曰齒後大者曰牙舌本舌根也咽所以通飲食居喉之後喉所以通呼吸居咽之前嗌音益喉也會厭在喉間為音聲啟閉之戶肺系喉嚨也頏顙頏音杭又上去二聲顙思嘗切咽顙也頸項頭莖之側曰頸頭莖之後為項又腦後曰項天柱骨肩骨上際頸骨之根也肩解膂上兩角為肩解肩胛胛音甲肩解下成片骨也亦名肩膊巨骨膺上橫骨膺音英胸前為膺一曰胸兩旁高處為膺胸中兩乳之間也膈膈膜也膈上為宗氣之所聚是為膻中腋脅之上際腹臍之上下皆曰腹臍下為少腹季脅脅下小肋胠區去二音腋之下脅之上也鳩尾蔽心骨也𩩲骬音結於即鳩尾別名眇中眇音秒季脅下兩旁空軟處也脊骨脊音即椎骨也胂音申膂內曰胂夾脊肉也膂同呂脊骨曰呂象形也又曰夾脊兩旁肉也髃骨髃音魚端也肩端之骨腰骨尻上橫骨也腰髁髁苦瓦切中原雅音作去聲即腰髃骨自十六椎而下俠脊附著之處也毛際曲骨兩旁為毛際其動脈即足陽明之氣衝也睪音高陰丸也篡初貫切屏翳兩筋間為篡篡內深處為下極下極兩陰之間屏翳處也即會陰穴臀音屯機後為臀尻旁大肉也機挾腰髓骨兩旁為機髖音寬尻臀也一曰兩股間也尻開高切尾骶骨也亦名窮骨肛音工又好綱切俗作綱大腸門也臑儒軟二音又奴刀切肩膊下內側對腋處高起白肉也肘手臂中節也一曰自曲池以上為肘臂肘之上下皆名為臂一曰自曲池以下為臂腕臂掌之交也兌骨手外踝也寸口關前後兩手動脈處皆曰寸口關手掌後動脈高骨處曰關魚際在手腕之前其肥肉隆起處形如魚者統謂之魚寸之前魚之後曰魚際穴大指次指謂大指之次指即食指也足亦同小指次指小指之次指即無名指也足同髀比婢二音股也一曰股骨髀關伏兔上交絞處曰髀關髀厭捷骨之下為髀厭即髀樞中也髀樞捷骨之下髀之上曰髀樞當環跳穴股大腿也伏兔骸前膝上起肉處曰伏兔臏頻牝二音膝蓋骨也膕音國膝後曲處曰膕輔骨膝下內外側大骨也成骨膝外廉之骨獨起者腨音篆一名腓腸下腿肚也腓腸腓音肥足肚也胻骨胻音杭又形敬切足脛骨也骭音干足脛骨也脛形景形敬二切足莖骨也絕骨外踝上尖骨曰絕骨䐃劬允切筋肉結聚之處也直音云腸中脂王氏曰肘膝後肉如塊者踝骨踝胡寡切足跗後兩旁圓骨內曰內踝外曰外踝俗名孤拐骨手腕兩旁圓骨亦名踝骨跗附敷二音足面也內筋內踝上大筋在太陰後上踝二寸所足岐骨大指本節後曰岐骨跟音根骨足根也覈骨覈亥陌切又胡骨亥不二切一作核骨足大指本節後內側圓骨也踵足跟也踹音煅足跟也本經與通用臚閭盧二音皮也一曰腹前曰臚三毛足大指爪甲後為三毛毛後橫紋為聚毛骨度下文皆骨度篇古數然骨之大者則太過小者則不及此亦言其則耳頭部頭之大骨圍二尺六寸發所覆者顱至項一尺二寸顱額顱覆者言前髮際至後項髮際也發以下至頤長一尺頷中為頤頷腮也兩顴相去七寸角以下至柱骨長一尺耳上側旁曰角肩胛上際頸根曰柱骨耳前當耳門者廣一尺三寸耳後當完骨者廣九寸完骨耳後髮際高骨也項發以下至背骨長三寸半自後髮際以至大椎項骨三節處也頭部折法以前髮際折後髮際為一尺二寸如髮際不明則取眉心直上後至大杼骨折作一尺八寸此為直寸橫寸法以眼內角至外角比為一寸頭部橫直寸法並依此督脈神庭至太陽曲差曲差至少陽本神本神至陽明頭維各開一寸半自神庭至頭維共開四寸半胸腹部結喉以下至缺盆中長四寸此以巨骨上陷中而言即天突穴處缺盆以下至𩩲骬之中長九寸𩩲骬中至天樞長八寸天樞足陽明穴名在臍旁此指平臍而言天樞以下至橫骨長六寸半橫骨橫長六寸半毛際下骨曰橫骨按此古數以今用上下穴參較多有未合宜從後胸腹折法為當胸圍四尺五寸腰圍四尺二寸兩乳之間廣九寸半當折八寸為當兩髀之間廣六寸半此當兩股之中橫骨兩頭之處俗名髀縫胸腹折法直寸以中行為三自缺盆中天突穴起至歧骨際上中庭穴止折作八寸四分自𩩲骬上歧骨際下至臍心折作八寸臍心下至毛際曲骨穴折作五寸橫寸以兩乳相去折作八寸胸腹橫直寸法並依此背部膂骨以下至尾骶二十一節長三尺膂骨脊骨也脊骨外小而內巨人之所能負任者以是骨之巨也脊骨二十四節今云二十一節者除項骨三節不在內尾骶骨男子者尖女人者平背部折法自大椎至尾骶通折三尺上七節各長一寸四分一釐共九寸八分七釐中七節各一寸六分一釐共一尺一寸二分七釐第十四節與臍平下七節各一寸二分六釐共八寸八分二釐總共二尺九寸九分六釐不足四釐者有零未盡也直寸依此橫寸用中指同身寸法脊骨內闊一寸凡云第二行夾脊一寸半三行夾脊三寸者皆除脊一寸外淨以寸半三寸論故在二行當為二寸在三行當為三寸半側部自柱骨下行腋中不見者長四寸柱骨頸項根骨也腋以下至季脅長一尺二寸季脅小肋也季脅以下至髀樞長六寸大腿曰股股上曰髀捷骨之下大股之上兩骨合縫之所曰髀樞當足少陽環跳穴處也髀樞下至膝中長一尺九寸四肢部肩至肘長一尺七寸肘至腕長一尺二寸半臂之中節曰肘腕至中指本節長四寸臂掌之交曰腕本節至其末長四寸半指之後節曰本節橫骨上廉下至內輔之上廉長一尺八寸骨際曰廉膝旁之骨突出者曰輔骨內曰內輔外曰外輔內輔之上廉以下至下廉長三寸半上廉下廉可摸而得內輔下廉下至內踝長一尺六寸踝骨義見前內踝以下至地長三寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸膝膕以下至跗屬長一尺二寸膕腿彎也跗足面也膝在前膕在後跗屬者凡兩踝前後脛掌所交之處皆為跗之屬也跗屬以下至地長三寸足長一尺二寸廣四寸半手足折量並用後中指同身寸法同身寸法說同身寸者謂同於人身之尺寸也人之長短肥瘦各自不同而穴之橫直尺寸亦不能一如今以中指同身寸法一概混用則人瘦而指長人肥而指短豈不謬誤故必因其形而取之方得其當如標本賦曰取五穴用一穴而必端取三經用一經而可正蓋謂並鄰經而正一經聯鄰穴而正一穴譬之切字之法上用一音下用一韻而夾其聲於中則其經穴之情自無所遁矣故頭必因於頭腹必因於腹背必因於背手足必因於手足總其長短大小而折中之庶得謂之同身寸法法附前各條之下而後之所謂中指同身寸法者雖不可混用而亦有當用之處並列於後中指同身寸法以男左女右手大指中指圓曲交接如環取中指中節橫紋兩頭盡處比為一寸凡手足尺寸及背部橫寸無折法之處乃用此法其他不必混用古今尺寸不同說骨度篇曰人長七尺五寸者其骨節之大小長短各幾何伯高曰頭之大骨圍二尺六寸蓋古之尺小大約古之一尺得今之八寸其言七尺五寸者得今之六尺其言二尺六寸者得今之二尺零八分也其餘仿此然骨大者必有太過骨小者必有不及凡用折法者但隨人之大小而為盈縮庶盡其善骨數王金壇曰人之周身總有三百六十五骨節以一百六十五字都關次之首自鈴骨之上為頭左右前後至轅骨以四十九字共關七十二骨巔中為都顱骨者一有勢微有髓及有液次顱為數髏骨者一有勢微有液髏前為頂威骨者一微有髓女人無此骨髏後為腦骨者一有勢微有髓腦後為枕骨者一有勢無液枕就之中附下為天蓋骨者一下為肺系之本蓋骨之後為天柱骨者一下屬脊窳有髓蓋前為言骨者一言上覆合於髏骨有勢無髓言下為舌本骨者左右共二有勢無髓髏前為囟骨者一無勢無液囟下為伏委骨者一俚人訛為伏犀骨是也無勢髓伏委之下為俊骨者一附下即眉宇之分也無勢髓眉上左為天賢骨者一右為天貴骨者一眉上直目睛也俱無勢髓左睛之上為智宮骨者一無勢髓右睛之上為命門骨者一兩睛之下中央屬鼻鼻之前為梁骨者一無勢髓梁之左為顴骨者一有勢無髓下同梁之右為糾骨者一顴糾之後即耳之分梁之端為嵩柱骨者一無勢髓左耳為司正骨者一無勢髓右耳為司邪骨者一同上正邪之後為完骨者左右共二無勢髓完骨之上附內為嚏骨者一無勢少液嚏後之上為通骨者左右前後共四有勢少液嚏上為齶骨者一無勢多液其齶後連屬為頷也左頷為乘骨者一有勢多液右頷為車骨者一同上乘車之後為轅骨者左右共二有勢有液乘車上下出齒牙三十六事無勢髓庸下就一則不滿其數復次鈴骨之下為膻中左右前後至蓧以四十字關九十七骨轅骨之下左右為鈴骨者二多液鈴中為會厭骨者一無勢髓鈴中之下為咽骨者右中及左共三無髓嚥下為喉骨者左中及右共三同上喉下為嚨骨者環次共十事同上嚨下之骨為肺系骨者累累然共十二無勢髓肺系之後為谷骨者一無髓谷下為㿠道骨者左右共二同上嚨外次下為順骨者共八少液順骨之端為順隱骨者共八同上順之下左為洞骨者一女人無此順之下右為掤骨者一女人無此洞掤之下中央為𩩲骬骨者一無髓俚人呼為鳩尾𩩲骬直下為天樞骨者一無髓鈴下之左右為缺盆骨者二有勢多液左缺盆前之下為下魘骨者一無髓右缺盆前之下為分饍骨者一同上魘饍之後附下為倉骨者一同上倉之下左右為髎骨者共八有勢無液髎下之左為胸骨者一男子此骨大者好勇髎下之右為蕩骨者一女子此骨大則大夫胸之下為烏骨者一男子此骨滿者發早白蕩之下為臆骨者一此骨高多訛妄鈴中之後為脊窳骨者共二十二上接天柱有髓脊窳次下為大動骨者一上通天柱共成二十四椎大動之端為歸下骨者一道家謂之尾閭歸下之後為篡骨者一此骨能限精液歸下之前為蓧骨者一此骨薄者多處貧下復次缺盆之上左右至襯以二十五字關六十骨此下止分兩手臂至十指之端眾骨支其缺盆之後為傴甲骨者左右共二有勢多液傴甲之端為甲隱骨者左右共二此骨長則至腎前支缺盆為飛動骨者左右共二此骨病痱緩次飛動之左為龍臑骨者一有勢並無髓液次飛動之右為虎沖骨者一同上龍臑之下為龍本骨者一虎沖之下為虎端骨者一俱有勢有髓本端之下為腕也龍本上內為進賢骨者一男子此骨隆為名臣虎端上內為及爵骨者一女人此骨高為命婦腕前左右為上力骨者共八有勢多液次上力為駐骨者左右共十同上次駐骨為搦骨者左右共十同上次搦為助勢骨者左右共十左助外為爪右助外為甲爪甲之下各有襯骨左右共十無勢無液復次𩩲骬之下左右前後至初步以五十一字關一百三十六骨此下至兩乳下分左右自兩足心眾骨所會處也𩩲骬之下為心蔽骨者一無髓𩩲骬之左為脅骨者上下共十二居小腸之分也左脅之端各有脅隱骨者分次亦十二無髓脅骨之下為季脅骨者共二多液季脅之端為季隱骨者共二無髓𩩲之右為肋骨者共十二處大腸之也分也右肋之端為肋隱者共十二無髓肋骨之下為眇肋骨者共二名無隱骨唯獸有之蓧骨之前為大橫骨者一有勢少髓橫骨之前為白環骨者共二有勢有液白環之前為內輔骨者左右共二有勢有液內輔之後為骸關骨者左右共二同上骸關之下為揵骨者左右共二同上揵骨之下為髀樞骨者左右共二有勢多髓髀樞下端為膝蓋骨者左右共二無勢多液膝蓋左右各有俠升骨者共二有勢多液髀樞之下為䯒骨者左右共二有勢多髓䯒骨之外為外輔骨者左右共二有勢有髓䯒骨之下為立骨者左右共二同上立骨左右各有內外踝骨者共四有勢少液踝骨之前各有下力骨者左右共十有勢多液踝骨之後各有京骨者左右共二有勢少液下力之前各有釋欹骨者左右共十釋欹之前各有起僕骨者共十有勢起僕之前各有平助骨者左右共十有勢平助之前各有襯甲骨者左右共十無勢少液釋欹兩旁各有核骨者左右共二有勢多液起僕之下各有初步骨者左右共二有勢無髓有液女人則無此骨凡此三百六十五骨也天地相乘惟人至靈其女人則無頂威左洞右及初步等五骨只有三百六十骨又男子女人一百九十骨或隱或襯或無勢髓餘二百五十六骨並有髓液以藏諸筋以會諸脈溪谷相需而成身形謂之四大此骨度之常也稽檢骨不合金壇骨數說壽田人身三百六十五骨節合周天之三百六十五度王金壇先生總以一百六十五字都關次之矣而經筋骨空骨度氣府氣穴說文師傳甲乙經通天論諸篇之名目與金壇相懸三百六十五之數亦不合不知金壇之考覈諱而不呈又不知臆度其詞吻合天數假若臆度何其有無勢髓有液無液之鑿鑿也總之人身合天內經悉載非自金壇始也又考金鑑正骨科骨度部分清晰名目差同洗冤錄論沿身骨脈自手及頭至足其中肉骨關節交會紊而不明細閱檢骨數檢骨格想是骨無所遁數無所朦且男婦骨之多寡有無逐件拈出必可闢而可闔之骨數也其與周天之數不合者有無勢髓之骨脆嫩之骨檢尋不得故不合也今遵驗骨檢骨之條目錄出及內經正骨科之部分名目一一附註補入醫林之考覈豈不詳而且備哉驗骨數出洗冤錄男子骨白女子骨黑明冤錄云婦人生前出血如河水故骨黑又云婦人按月行經血系流散故骨黑若天癸未至者其骨仍白也髑髏骨說文頂也男子自頂及耳並腦後共八片蔡州人有九片腦後橫一縫當正直下至髮際別有一直縫婦人只六片腦後橫一縫當正直下無縫金鑑云巔頂骨男子三叉女人十字縫一名天靈蓋位居至高內函腦髓以統全體是天靈蓋即頂心骨也又以囟門骨為天靈蓋者非牙齒上下有二十四或二十八或三十二或三十六胸前骨即龜子骨在胸乳間左右排連心坎骨一片狀如錢大胸膛內有一護心軟骨即鳩尾也肩井臆骨及飯匙骨左右各一片肩井臆骨下為血盆骨其下外連橫髃者為飯匙骨又其下即左右排連之龜子骨也項與脊骨各十二節自項至腰共二十四椎骨上有一大椎骨人身項骨五節背骨十九節合之得二十有四是項之大椎即在二十四骨之內此與內經所載之數未合集說恐訛肩井飯匙在內庸齋附說屢詢檢官皆云連項大椎骨實得二十四骨今骨圖注項骨五節背骨十九節內方骨一節在尾蛆骨之上是連項大椎尾蛆骨共二十五節矣須知尾蛆骨不入脊骨行下壽田按項與脊骨各十二節當云共二十四節用各十二節字末妥左右肋骨男子各十二條八條長四條短婦人各十四條此統據前後肋言之非前肋有此骨數也男女腰間各有一骨大如掌有八孔作兩行樣即方骨也其骨孔即四髎穴所金鑑名尾骶骨即尻骨也其形上寬下窄上承腰背諸骨兩旁各有四孔名曰八髎其末節名曰尾閭一名骶端一名橛骨一名窮骨俗名尾椿手足骨二段男子左右手腕及左右臁肕字典音刃音尹堅肉也人能正靜筋肕而骨強骨邊皆有裨骨婦人無壽田按原用髀字考臂字注自肘至腕曰臂釋名臂裨也在旁曰裨韻會曰附也又輔也髀說文股也在下稱也此則肘之旁骨當曰裨骨明矣今改正之足之兩脛骨旁小骨曰䯒骨兩足膝頭各有靨骨隱在其間如大指大此骨隱在膝蓋中間圖格內不載手掌腳板各五縫手腳大拇指並腳第五趾各二節餘十四指並三節尾脊骨若豬腰子仰在脊骨節下男子者其綴脊處凹兩邊皆有尖瓣如稜角周布九竅婦人者其綴脊處平直周布六竅大小便處各一竅檢骨格出洗冤錄仰面頂心骨囟門骨兩額角額顱骨金鑑名山角骨左右共二兩太陽穴金鑑有扶桑骨近兩額骨旁太陽肉內凹處也兩眉稜骨金鑑有凌雲骨在前髮際下即正中額骨其兩眉上之骨即俗名左天賢骨右天貴骨兩額角也兩眼眶骨金鑑名睛明骨即目窠四圍目眶骨也其上曰眉稜骨其下曰䪼骨䪼骨下接上牙床也鼻梁骨金鑑又有中血堂即鼻內頞下脆骨空虛處也兩顴骨兩腮頰骨頷頦骨金鑑名地閣骨即兩牙車相交之骨又名頦俗名下巴骨上載牙齒頰車骨金鑑言即下牙床承載諸齒能咀食物有運動之象故名頰車其骨尾形如勾上控於面頰之環又有兩鉤骨名曲頰即上頰之合鉗曲如環形以納下牙車骨尾之鉤者也兩耳竅兩耳根骨金鑑名玉梁骨即耳門骨其處上即曲頰下即頰車兩骨之合鉗也耳門內上通腦髓亦關靈明耳內又有禁骨口骨上下金鑑又有玉堂在口內上齶一名上含其竅即頏顙齒上下有二十四二十八三十二三十六不等金鑑言口齦所生之骨俗名曰牙有門牙虎牙槽牙上下盡根牙之別也嗓喉結喉骨共四層系脆骨日久易腐龜子骨即胸前三骨心坎骨金鑑名蔽心骨即鳩尾骨也其質系脆骨在胸下岐骨之間又有岐骨即兩鳧骨端相接之處其下即鳩尾骨也兩肩井臆骨金鑑名胸骨即𩩲骬骨乃胸脅眾骨之統名也一名膺骨一名臆骨俗名胸堂其兩側自腋而下至肋骨之盡處統名曰脅也兩血盆骨即飲盆骨兩橫髃骨髃骨者肩端之骨即肩胛骨臼端之上稜骨也其臼含臑上端兩飯匙骨金鑑名鎖子骨經名柱骨橫臥於兩肩前缺盆之外其兩端外接於肩解兩胎膊骨金鑑言名肩解即肩䯋與臑骨合縫處也俗名吞口一名肩頭其下附於脊背成片如翅者名肩胛亦名肩膊俗名倪板子骨又有臑骨即肩下肘上之骨也自肩下至手腕名肱俗名胳膊兩肘骨胳膊中節上下支骨交接處也俗名鵝鼻骨兩臂骨金鑑言自肘至腕有正輔二根其在下而形體長大連肘尖者為臂骨其在上而形體短細者為輔骨俗名纏骨疊並相倚俱下掌後接於腕焉按臂輔骨近於腕者曰關穴有名內外關兩裨骨即輔骨婦人無兩手內外踝兩腕骨金鑑言即掌骨乃五指之本即也一名壅骨俗名虎骨其骨大小六枚湊以成掌非塊然一骨也其上並接臂輔內骨之端其外側之骨名高骨一名銳骨亦名踝骨俗名龍骨以其能宛屈上下故名腕兩手掌骨十塊兩手指骨二十八節金鑑名錘骨又名竹節骨胯骨前左右金鑑言即髖骨也又名髁骨髖骨外向之凹其形似臼以納髀骨之上端如杵者也名曰機又名髀樞即環跳穴處兩腿骨金鑑言名大楗骨一名髀骨上端如杵入於髀樞之臼下端如錘接於䯒骨統名曰股臀肉連兩膝蓋骨金鑑言即連骸亦名臏骨形圓而扁覆於楗䯒上下兩骨之端而有筋聯屬其筋上過大腿至於兩脅下過䯒骨至於足背焉兩脛骨兩䯒骨即膝下踝上之小腿骨俗名臁脛骨者也其骨二根在前者名成骨又名骭骨其形粗在後者名輔骨其形細又名勞堂骨婦人無輔骨兩足內外踝在內者名合骨在外者名核骨兩肢骨在脛骨之下本節之上又名絕骨兩足掌骨趺骨十塊金鑑名跗骨又名足趺趺音膚集韻與跗同釋名拜於丈夫為趺趺然屈折下視地也兩腳根骨共八塊上承胻輔二骨之末一名跟骨有大筋附之俗名腳攣筋其筋從跟骨過踝骨至腿肚裡上至膕中過臀抵腰脊至項自腦後向前至目眥皆此筋之所達按跟骨八塊必有筋膜聯屬成縱橫之縫檢驗時筋膜脫去故分八塊也腳十趾共二十六節金鑑言趾者足之指也名以趾者所以別於手也俗名足節大趾本節後內側圓骨努突者一名核骨又名覈骨俗呼為孤拐也足外側大骨曰京骨京骨之前當小趾本節後者曰束骨合面腦後骨乘枕骨左右婦人無左右金鑑名後山骨其骨形狀不同或如品字或如山字或如川字或圓尖或月芽形或偃月形或雞子形皆屬枕骨兩耳後骨金鑑名壽臺骨即完骨在耳後接於耳之玉樓骨者也項骨金鑑名旋臺骨又名玉柱骨即頸骨三節也一名天柱骨脊骨連項骨共二十四節兩琵琶骨亦名髀骨即胛骨也兩肋骨共二十四條即釵骨婦人多四條金鑑又有鳧骨即胸下之邊肋也上下二條左右共四自項骨以下至七節兩旁橫出髖骨按髖骨即胯骨此言髖骨恐系訛其名耳至六節為脊背骨至十二節為脊膂骨至十九節為腰眼骨腰眼骨即腰門骨與命門骨也命門當在十四椎下以此言腰不合方骨胯後骨左右尾蛆骨男九竅女六竅金鑑言背骨自後身大椎以下腰以上之通稱也其骨一名脊骨一名膂骨俗呼脊梁骨其形一條居中其二十一節下盡尻骨之端上載兩肩內系臟腑其兩旁諸骨附接橫疊而彎合於前則為胸脅也腰骨即脊骨十四椎十五椎十六椎間之骨也羞秘骨產門上男子無另有架骨一塊與尾蛆骨相連橫於小腹之下名橫骨男子同仰人經脈圖伏人經脈圖十二經歌太陽小腸足膀胱陽明大腸足胃當少陽三焦足膽配太陰手肺足脾鄉少陰心經足為腎厥陰包絡足肝方此歌上者為手太少陰陽為經十二經納甲歌此歌諸腑配陽諸臟配陰甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎臟三焦陽腑須歸丙包絡從陰丁火旁舊云三焦亦向壬中寄包絡同歸入癸方雖三焦為決瀆猶可言壬而包絡附心主安得云癸且二臟表裡皆相火也今改正之十二經氣血多少歌多氣多血惟陽明少氣太陽同厥陰二少太陰常少血六經氣血須分明十二經營行次序逆順歌肺大胃脾心小腸膀腎包焦肝膽續手陰臟手陽手頭足陰足腹陽頭足後二句言凡手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹也經絡次序出十四經發揮十二經絡始於手太陰其支者從腕後出次指端而交於手陽明手陽明之支者從缺盆上挾口鼻而交於足陽明足陽明之支者從跗上出大指端而交於足太陰足太陰之支者從胃別上膈注心中而交於手少陰手少陰無支者直至本經少衝穴而交於手太陽手太陽之支者別頰上至目內眥而交於足太陽足太陽之支者從膊內左右別下合膕中下至小指外側端而交於足少陰足少陰之支者從肺出注胸中而交於手厥陰手厥陰之支者從掌中循小指次指出其端而交於手少陽手少陽之支者從耳後出至目銳眥而交於足少陽足少陽之支者從跗上入大指爪甲出三毛而交於足厥陰足厥陰之支者從肝別貫膈上注肺入喉嚨之後上額循巔行督脈絡陰器過毛中行任脈入缺盆下注肺中而復交於手太陰也十二經脈起止歌經始太陰而厥陰最後穴先中府而終則期門原夫肺脈胸中始生出腋下而行於少商絡食指而接乎陽明大腸起自商陽終迎香於鼻外胃厲承泣而降尋厲兌於足經脾自足之隱白趨大包於腋下心由極泉而出注小指之少衝小腸兮起端於少澤維肩後上絡乎聽宮膀胱穴自睛明出至陰於足外腎以湧泉發脈通俞府於前胸心包起乳後之天池絡中衝於手中指三焦始名指之外側從關衝而絲竹空膽從瞳子髎穴連竅陰於足之四指肝因大敦而上至期門而復於太陰肺經周身經絡部位歌脈絡周身十四經六經表裡督和任陰陽手足經皆六督總諸陽任總陰諸陽行外陰行里四肢腹背皆如此督由脊骨過齦交臍腹中行任脈是足太陽經小指藏從跟入膕會尻旁上行夾脊行分四前系睛明脈最長少陽四指端前起外踝陽關環跳里從脅貫肩行曲鬢耳前耳後連眥尾大指次指足陽明三里天樞貫乳行腹第三行通上齒環唇俠鼻目顴迎足有三陰行內廉厥中少後太交前腎出足心從內踝俠任胸腹上廉泉太厥兩陰皆足拇內側外側非相聯太陰內側衝門出腹四行兮挨次編厥陰毛際循陰器斜絡期門乳肋間手外三陽誰在上陽明食指肩髃向頰中鑽入下牙床相逢鼻外迎香傍三焦名指陽明後貼耳周迴眉竹湊太陽小指下行低肩後盤旋耳顴遘還有三陰行臂內太陰大指肩前配厥從中指腋連胸極泉小內心經位手足三陽俱上頭三陰穴止乳胸遊唯有厥陰由顙後上巔會督下任流經脈從來皆直行絡從本部絡他經經凡十四絡十六請君切記須分明十六絡者自十五絡之外復有胃之大絡名曰虛里也十二經流注時序歌肺寅大卯胃辰宮脾巳心午小未中膀申腎酉心包戍亥三子膽醜肝通此歌出子午流注等書及張世賢等註釋其以十二時分配十二經似乎近理然而經之長短穴之多少大相懸絕又安能按時分配且失五十周於身之義今錄之以俟辯正十六絡穴歌手太陰絡名列缺陽明之絡偏厲當豐隆穴系陽明足胃之大絡虛里鄉足太陰絡公孫穴脾經大絡大包場手少陰絡在通里手太陽絡支正疆足太陽絡飛陽記足少陰絡大鐘藏手厥陰絡內關地手少陽絡外關央足少陽絡光明位足厥陰絡蠡溝堂屏翳相承任脈絡督之絡脈號長強經脈篇只十五絡平人氣象論曰胃之大絡名曰虛里是共十六絡也然足太陰絡曰公孫而復有脾之大絡曰大包足陽明絡曰豐隆而復有胃之大絡曰虛里故諸經之絡皆一而惟脾胃之絡皆二也宗營衛三氣論宗氣積於胸中出於喉嚨以貫心脈而行呼吸決氣上篇曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉者是謂宗氣宗之為言大也營氣者陰氣也水穀之精氣也其精氣之行於經者為營氣營氣出於中焦並胃中出上焦之後上注於肺受氣取汁化而為血以奉生身莫貴於此其行始於太陰肺經漸降而下而終於厥陰肝經隨宗氣而行於十二經隧之中故曰清者為營營行脈中衛氣者陽氣也水穀之悍氣也其浮氣之慓疾滑利而不循於經者為衛氣衛氣出於下焦漸升而上每日平旦陰盡陽氣出於目之睛明穴上行於頭晝自足太陽始行於六陽經以下陰分夜自足少陰始行於六陰經復注於腎晝夜各二十五周不隨宗氣而自行於各經皮膚分肉之間故曰濁者為衛衛行脈外標本運氣歌張子和少陽從本為相火太陰從本濕土坐厥陰從中火是家陽明從中濕是我太陽少陰標本從陰陽二氣相包裹風從火斷汗之宜燥與濕兼下之可萬病能將火濕分徹開軒岐無縫鎖十一募穴歌募結募也為經氣之所聚大腸天樞肺中府小腸關元心巨闕膀胱中極腎京門肝募期門膽日月胃中腕兮脾章門三焦募在石門穴按募只是十一者心與心包共一募也八會穴歌腑會中脘臟章門髓會絕骨筋陽陵骨大椎兮血膈俞氣膻中兮脈太淵絕骨即懸鐘穴所前面頸穴總圖胸腹總圖後頭頂穴總圖背部總圖側面肩項總圖側脅肋總圖陰手總圖陽手總圖陰足總圖陽足總圖
